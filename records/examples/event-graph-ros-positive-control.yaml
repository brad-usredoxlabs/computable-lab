# Event graph for ROS positive control assay
# Demonstrates create_container, add_material, incubate, and read events

id: EG-ROS-POS-A1
name: "ROS Positive Control - Well A1"
description: "Positive control assay with H2O2 induction"

subject_ref:
  kind: record
  type: well
  id: "LI-PLATE-ROS-1:A1"
  label: "A1"

events:
  - eventId: evt-create-container-A1
    event_type: create_container
    details:
      labwareInstanceId:
        kind: record
        id: LI-PLATE-ROS-1
        type: labware-instance
      labware_definition_ref:
        kind: record
        id: LBW-96-WELL-PLATE
        type: labware

  - eventId: evt-add-h2o2-A1
    event_type: add_material
    details:
      material_ref:
        kind: record
        id: MAT-SPEC-H2O2
        type: material-spec
      volume:
        value: 100
        unit: uL
      concentration:
        value: 100
        unit: uM

  - eventId: evt-incubate-A1
    event_type: incubate
    details:
      duration:
        value: 30
        unit: min
      temperature:
        value: 37
        unit: degC

  - eventId: evt-read-A1
    event_type: read
    details:
      readout: ros-fluorescence
      value: 12345
      unit: RFU

labwares:
  - labwareId: LI-PLATE-ROS-1
    labwareType: plate_96
    name: "ROS Assay Plate 1"

tags:
  - ros-assay
  - positive-control
  - h2o2
