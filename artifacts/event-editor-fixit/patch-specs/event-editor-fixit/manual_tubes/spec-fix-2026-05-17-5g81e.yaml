title: Fix deterministic precompile to emit labware placement for deck-slot
  targets instead of well-addressed events
rationale: The compiler trace shows that the prompt 'put a 96-well plate on B2'
  resulted in an 'add_material' event with 'B2' listed in 'parameters.wells'.
  This indicates the deterministic_precompile pass incorrectly parsed the deck
  slot 'B2' as a well address for liquid handling, rather than recognizing the
  'put ... on <deck-slot>' pattern as a labware placement instruction. The fix
  must be in the compiler's semantic parsing/lowering logic to detect when a
  locative phrase refers to a deck slot (validated against known slots) and emit
  a placement candidate with a deckSlot field, rather than a well-addressed
  event.
