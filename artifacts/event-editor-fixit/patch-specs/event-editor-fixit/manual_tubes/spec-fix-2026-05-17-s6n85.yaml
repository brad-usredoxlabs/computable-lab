title: Fix deterministic precompile to emit deck placement for labware on deck
  slots instead of treating deck tokens as well addresses
rationale: "The compiler trace shows that the prompt 'put a 96-well plate on B2'
  correctly resolved the labware noun but incorrectly parsed the deck token 'B2'
  as a well address in the parameters (wells: ['B2']) and count as 96. This
  caused the placement pass to emit no labware additions and instead generate a
  liquid handling event targeting a non-existent well. The fix must be in the
  deterministic precompile pass to recognize locative phrases following labware
  nouns as deck placement instructions, emitting a candidate labware with a
  deckSlot instead of a well parameter."
