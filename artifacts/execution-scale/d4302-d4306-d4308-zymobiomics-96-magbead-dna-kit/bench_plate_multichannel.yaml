kind: execution-scale-plan
recordId: execution-scale-plan/robot_deck
profileRef: execution-scale-profile/robot-assist-plus-96
sourceLevel: manual_tubes
targetLevel: robot_deck
status: ready
sampleLayout:
  labwareRole: sample_plate
  labwareKind: 96_well_plate
  labwareDefinition: lbw-def-generic-96-well-plate
  sampleCount: 10
  wellGroups:
    - groupId: samples
      wells:
        - A1
        - B1
        - C1
        - D1
        - E1
        - F1
        - G1
        - H1
        - A2
        - B2
reagentLayout:
  - materialRole: reagent
    sourceLabwareRole: reagent_reservoir
    sourceLabwareKind: 1_well_reservoir
    sourceLabwareDefinition: lbw-def-generic-reservoir-1-v1
    sourceWells:
      - "1"
    reason: prompt mentions reagents but compiled events did not identify concrete
      reagent roles
pipettingStrategy:
  pipetteMode: multi_channel_parallel
  channels: 8
  laneStrategy: parallel_lanes
  channelization: multi_channel_prefer
  batching: group_by_source
deckBinding:
  platform: integra_assist
  requiredLabwareDefinitions:
    - lbw-def-generic-96-well-plate
    - lbw-def-generic-reservoir-1-v1
  requiredTools:
    - pipette-capability/p20-multi-8
assumptions:
  - Reagent source role is provisional until material roles are resolved.
  - Samples are mapped down plate columns in row order.
  - Manual tube operations preserve biological intent when lifted to plate wells
    and shared reagent reservoirs.
  - ASSIST PLUS lowering uses the same plate and lane semantics as bench
    multichannel planning, then binds them to deck-compatible labware and tool
    profiles.
blockers: []
