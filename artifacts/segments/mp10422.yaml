  Introduction


  \                                       CellROX® Oxidative Stress Reagents are
  fluorogenic probes designed to reliably measure

  \                                       reactive oxygen species (ROS) in live
  cells. The cell-permeable reagents are non-fluorescent

  \                                       or very weakly fluorescent while in a
  reduced state and upon oxidation exhibit strong

  \                                       fluorogenic signal. CellROX® Green
  Reagent is a DNA dye, and upon oxidation, it binds to

  \                                       DNA; thus, its signal is localized
  primarily in the nucleus and mitochondria. In contrast,

  \                                       the signals from CellROX® Deep Red and
  CellROX® Orange Reagents are localized in the

  \                                       cytoplasm. The fluorescence resulting
  from CellROX® Oxidative Stress Reagents can be

  \                                       measured using traditional
  fluorescence microscopy, high-content imaging and analysis,

  \                                       microplate fluorometry, or flow
  cytometry. These reagents can be detected using the

  \                                       appropriate benchtop instrument such
  as the Attune® Acoustic Focusing Cytometer, Tali®

  \                                       Image-based Cytometer, and FLoid™ Cell
  Imaging Station (See Table 2, page 2).


  \                                       The staining workflow is simple
  (Figure 2, page 2), and the reagent can be applied to cells

  \                                       in complete growth medium or buffer.
  All of the CellROX® Oxidative Stress Reagents are

  \                                       very photostable when compared to
  traditional ROS detection dyes. In addition, some of

  \                                       the reagents retain their signal after
  formaldehyde fixation and detergent permeabilization

  \                                       (Table 2, page 2), allowing for assay
  flexibility and improved workflows compared to those

  \                                       based on classic dyes for ROS
  detection.


  \                                       CellROX® Oxidative Stress Reagents
  specifically detect ROS as shown by inhibition of

  \                                       menadione-induced ROS in endothelial
  cells (Figure 3, page 3). These probes have been

  \                                       used to evaluate ROS generated by
  various agents, including lipopolysaccharide, menadione,

  \                                       angiotensin II, and nefazodone in
  several different live-cell models.





