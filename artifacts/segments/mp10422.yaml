  \fBefore Starting


  \        Materials required but

  \                 not provided       • Cells and culture medium

  \                                    • Phosphate buffered saline (PBS, pH
  7.2–7.6)

  \                                    • Optional: Fixative (i.e., 3.7%
  formaldehyde in PBS)

  \                                    • Optional: Permeabilization solution
  (i.e., 0.5% Triton® X-100)




  \                      Caution       DMSO is known to facilitate the entry of
  organic molecules into tissues. Handle reagents

  \                                    containing DMSO using equipment and
  practices appropriate for the hazards posed by such

  \                                    materials. Dispose of the reagents in
  compliance with all pertaining local regulations. In case

  \                                    of contact with eyes, rinse immediately
  with plenty of water and seek medical advice. Always

  \                                    wear suitable laboratory protective
  clothing and gloves when handling this reagent.





  Experimental Protocols


  \                                    The following protocol was developed with
  BPAE, HepG2, U-2 OS, and RAW microphage

  \                                    cells with an optimized CellROX® Reagent
  concentration of 5 μM, but the assay can be

  \                                    adapted for any cell type. Growth medium,
  cell density, cell type variations, and other factors

  \                                    may influence labeling. In initial
  experiments, we recommend testing a concentration range

  \                                    of the reagent to determine the optimal
  experimental conditions and the concentration for

  \                                    your cell type.


  \                                    The CellROX® Reagents are sensitive to
  exposure to light and air; care should be taken not

  \                                    to keep the vials open for long periods
  of time. Discard any unused material once the vial is

  \                                    opened.




  CellROX® Reagent Staining and

  \                    Detection       Following protocol for staining cells can
  be adapted for CellROX® Deep Red, CellROX®

  \                                    Orange, and CellROX® Green Reagents, but
  specific conditions should be determined

  \                                    separately for each reagent.


  \                                 1. Treat the cells with the test compound or
  drug and incubate for the recommended time.


  \                                    Note: You do not need to remove the
  medium after test compound or drug treatment.


  \                                 2. Add the CellROX® Reagent at a final
  concentration of 5 μM to the cells and incubate for

  \                                    30 minutes at 37°C.


  \                                 3. Remove medium and wash cells three times
  with PBS.


  \                                 4. Optional: If you are using the CellROX®
  Deep Red or the CellROX® Green Reagent, you

  \                                    can preserve the cells with a
  formaldehyde-based fixative at this stage. Fixation with 3.7%

  \                                    formaldehyde for 15 minutes is
  recommended. Analyze the signal within 24 hours for the

  \                                    CellROX® Green Reagent and within 2 hours
  for the CellROX® Deep Red Reagent.


  \                                    Note: You can use the Live Cell Imaging
  Solution (Cat. no A14291DJ) to keep the cells

  \                                    healthier during analysis with longer
  duration.





