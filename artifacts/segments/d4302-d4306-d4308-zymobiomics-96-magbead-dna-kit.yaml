  \fSpecifications

  \ •     Sample Sources – Bacterial (including endospores)1, fungal,

  \       protozoan, algal, viral, mitochondrial, and host DNA is efficiently

  \       isolated from ≤ 100 mg of mammalian feces, ≤ 100 mg soil, and 5 –

  \       20 mg (wet weight) of bacterial/fungal cells2, biofilms, and water3.


  \ •     Bead Beating System – The innovative ZymoBIOMICS™ lysis

  \       system enables complete homogenization/disruption of the microbial

  \       cells walls and accurate microbial DNA analysis, free of bias. To

  \       ensure unbiased lysis, calibration of each bead-beating device is

  \       recommended by using the ZymoBIOMICS™ Microbial Community

  \       Standard (see Appendix C).


  \ •     DNA Purity – High quality, inhibitor-free DNA is eluted with

  \       ZymoBIOMICS™ DNase/RNase Free Water and is suitable for all

  \       downstream applications including PCR and Next-Generation

  \       Sequencing.


  \ •     DNA Integrity – On average, post bead beating, genomic DNA is

  \       between 15-20 kb depending on the initial quality of the sample,

  \       making it amenable to Next-Generation Sequencing platforms

  \       requiring high molecular weight DNA. For optimal DNA integrity,

  \       collect samples in DNA/RNA Shield™4.


  \ •     DNA Recovery – Up to 5 µg total DNA can be eluted into 20 µl.


  \ •     Bioburden – A single preparation is guaranteed to contain less than

  \       3 bacterial genomic copies per µl of eluate as determined by

  \       quantitative amplification of the 16S rRNA gene when eluted using

  \       100 µl water.


  \ •     Materials Required, But Not Supplied – Centrifuge w/ microplate

  \       carriers and 96-well plate/block disruptor or pulverizer.





