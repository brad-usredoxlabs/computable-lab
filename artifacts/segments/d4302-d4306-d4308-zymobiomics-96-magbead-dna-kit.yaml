  \fProduct Description

  The ZymoBIOMICS™ 96 MagBead DNA Kit is designed for purifying

  DNA from a wide array of sample inputs (e.g. feces, soil, water, biofilms,

  etc.), that is immediately ready for microbiome or metagenome analyses.


  The ZymoBIOMICS™ innovative lysis system eliminates bias associated

  with unequal lysis efficiencies1 of different organisms (e.g. Gram-

  negative/positive bacteria including endospores 2, fungi, protozoans,

  algae, etc.) making it ideal for microbial community profiling. Unbiased

  mechanical lysis of tough microbes is achieved by bead beating with the

  innovative ultra-high density BashingBeads™ and validated using the

  ZymoBIOMICS™ Microbial Community Standard3, as shown in Figure 3.


  In addition, the ZymoBIOMICS™ 96 MagBead DNA Kit is equipped with

  Zymo Research’s proprietary OneStep™ PCR Inhibitor Removal

  technology, enabling PCR from the most PCR prohibitive environmental

  samples rich in humic and fulvic acids, tannins, melanin, and other

  polyphenolic compounds. Coupling state-of-the-art lysis technology with

  Zymo-Spin™ Technology results in superior yields of ultra-pure DNA ideal

  for all downstream applications including PCR, arrays, 16S rRNA gene

  sequencing, and shotgun sequencing4.




  \                               Innovation. Pure & Simple.





  1

  \  Chemical, enzymatic, and inferior lysis matrices (beads) lead to
  unrealistic representation of organisms in

  \  downstream metagenomic analyses that is not reflective of actual abundance.

  2

  \  See endospore lysis efficiency data in Appendix B.

  3

  \  For more information on the ZymoBIOMICS™ Microbial Community Standard
  (D6300) & ZymoBIOMICS™

  \  Microbial Community DNA Standard (D6305), see Appendix C.

  4

  \  DNA is predominately 15-20 kb and amenable to Next-Generation Sequencing
  techniques requiring high

  \  molecular weight DNA.



