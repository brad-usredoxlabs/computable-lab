  \fAppendix E


  Heat Sealing ZymoBIOMICS™ BashingBead™ Lysis Racks


  1. Remove all strip caps and use a Kimwipe to wipe away any residual

  \   beads found on the tops of the tubes.

  2. Transfer samples into individual lysis rack tubes according to the

  \   sample input guide found in Step 1 of the main protocol (Page 7).

  3. Cover the top of the lysis rack tubes with a Kimwipe and press down

  \   gently to remove any residual liquid.1

  4. Place the lysis rack on the sealing device stage.

  5. Center a sealing foil on top of the lysis rack, such that all tubes are

  \   covered by the foil with a slight overhang along each edge.

  6. Set heat sealing device to 180°C and allow the device adequate time

  \   to reach the target temperature.

  7. Press the sealer down onto the foil for 4 seconds to seal the rack.2

  Note: At no point should a roller (or similar) be used to press down the foil,
  as it

  can damage the bond between the sealing foil and lysis rack, causing leakage.


  8. Allow the sealed lysis rack to cool to room temperature before loading

  \   onto a mechanical lysis device.

  Note: Placing a rubber or silicone mat between the sealing foil and mounting
  clamp

  is recommended to protect the sealing foil from becoming worn or damaged by
  the

  clamp during mechanical lysis.


  9. Proceed with Step 3 of the main protocol (Page 8).


  For best results, it is recommended to use a validated heat sealing

  device, such as the Vitl Variable Temperature Sealer (VTS) (V902001),

  found here: https://vitlproducts.com/products/variable-temperature-

  sealer.





  1

  \    Avoid leaving liquid on the tops of the tubes. Residual liquid may
  negatively affect subsequent heat sealing.

  2

  \    If different sealing foils or devices are used, heat sealing parameters
  may require user optimization.





