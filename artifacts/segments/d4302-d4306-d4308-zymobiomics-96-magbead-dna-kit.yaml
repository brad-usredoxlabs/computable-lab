  (B) Bead beating - Tissue and Insect

  \ 1.   Add up to 15 mg of tissue/insect sample in a ZR BashingBead™ Lysis Tube

  \      (2.0 mm) (Cat. No. S6003-50) with 750 µl of ZymoBIOMICS™ Lysis

  \      Solution.

  \ 2.   Secure in a bead beater fitted with a 2 ml tube holder assembly and
  process

