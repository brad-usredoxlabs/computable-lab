protocol_text: "Real-Time PCR





  \                Protocol for Multiplex RT-qPCR Analysis

  \                Using PrimePCR Assays




  \    Abstract

  \    Multiplex real-time PCR using Bio-Rad’s PrimePCR Assays and iQ Multiplex
  Powermix enables

  \    quantitative relative gene expression analysis of up to five targets in
  qPCR. Traditionally, multiplex

  \    qPCR experiments have been challenging to design. This protocol describes
  an off-the-shelf solution

  \    for increasing throughput and reducing reagent costs through the adoption
  of multiplex assays.

  \    For one-step multiplex RT-qPCR using Reliance One-Step Multiplex Supermix
  and PrimePCR Probe

  \    Assays, refer to bulletin 7197.


