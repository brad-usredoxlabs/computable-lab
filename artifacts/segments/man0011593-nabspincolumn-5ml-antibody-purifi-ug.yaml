  Protein L binds to certain immunoglobulin kappa light chains.

  Because kappa light chains occur in members of all classes of

  immunoglobulin (that is, IgG, IgM, IgA, IgE and IgD), Protein L

  can purify these different classes of antibody. However, only those

  antibodies within each class that possess the appropriate kappa

  light chains will bind. Generally, empirical testing is required

  to determine if Protein L is effective for purifying a particular

  antibody of interest.





