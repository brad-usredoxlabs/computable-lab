  CellROX® Oxidative Stress Reagents

  Cat. Nos. C10422, C10443, C10444, C10448

  Pub. No. MAN0007457
  \t\t                                                                                    \
  Revision 1.0

  Detailed protocol is available online at www.lifetechnologies.com/manuals.

  WARNING! For every chemical, read the Safety Data Sheets (SDSs) and follow the
  handling instructions. Wear appropriate

  protective eyewear, clothing, and gloves. Safety Data Sheets (SDSs) are
  available from www.lifetechnologies.com/support.


  \ Chemical       CAS           Warning

  \ DMSO           67-68-5       Components of the product may be absorbed into
  the body through the skin.





  Spectral Characteristics of CellROX® Oxidative Stress Reagents

  \        CellROX® Reagent                                   Ex/Em maxima (in
  nm)

  \ CellROX® Deep Red Reagent                                       640/665

  \ CellROX® Orange Reagent                                         545/565

  \ CellROX® Green Reagent                                          485/520




  For research use only. Not for use in diagnostic procedures.

  \fQuick Protocol

  1.         Treat the cells with the test compound or drug.

  2.         Add the CellROX® Reagent at a final concentration of 5 μM.

  3.         Incubate the cells for 30 minutes at 37°C.

  4.         Remove medium and wash the cells 3 times with PBS.

  5.         Optional: If using CellROX® Deep Red or CellROX® Green, you may

  \           fix the cells with 3.7% formaldehyde for 15 minutes.

  6.         Optional: You may stain the cells with NucBlue™ Live Cell Stain, a

  \           nuclear counterstain, or another counterstain at this time.

  7.         Optional: If using CellROX® Green, you may permeabilize the

  \           cells with 0.5% Triton® X-100 for 10 minutes, if multiplexing with

  \           another reagent is desired.

  8.         Analyze the cells.

