  •    If the detergent in the membrane fraction interferes with downstream
  applications, use Thermo Scientific™ Pierce™

  \     Detergent Removal Spin Columns (Product No. 87776-7) to decrease the
  amount of detergent in the sample. However,

  \     the sample:resin ratio will need to be empirically determined since
  removing too much detergent may result in protein

  \     precipitation.



  Additional Material Required

  •    Protease and phosphatase inhibitors (e.g., Product No. 78440)

  •    Temperature-controlled mixer

  •    Cell scraper to remove adherent cells from plates

  •    5mL microcentrifuge tubes

  •    For soft tissues, a 2mL Dounce Tissue Grinder (e.g., Kontes or Wheaton
  Tenbroeck) is required.

  •    For hard tissues, a hand-held homogenizer for 0.5-1.5mL samples (e.g.,
  Brinkmann™ Polytron™ PT-1200CL

  \     Homogenizer)



  Procedure for Membrane Protein Extraction from Different Sample Types

  Choose the appropriate protocol for the sample type used.

  Protocol 1: Adherent Mammalian Cells

  1.   Resuspend 5 × 106 cells in the growth media by scraping the cells off the
  surface of the plate with a cell scraper.

  \     Centrifuge harvested cell suspension at 300 × g for 5 minutes.

  2.   Wash cell pellet with 3mL of Cell Wash Solution and centrifuge at 300 × g
  for 5 minutes.

  3.   Carefully remove and discard the supernatant. Resuspend the cells in
  1.5mL of Cell Wash Solution and transfer to a

  \     2mL centrifuge tube. Centrifuge at 300 × g for 5 minutes and discard
  supernatant.

  4.   Add 0.75mL of Permeabilization Buffer to the cell pellet. Vortex briefly
  to obtain a homogeneous cell suspension.

  \     Incubate 10 minutes at 4°C with constant mixing.

  5.   Centrifuge permeabilized cells for 15 minutes at 16,000 × g. Carefully
  remove the supernatant containing cytosolic

  \     proteins and transfer to a new tube.

  6.   Add 0.5mL of Solubilization Buffer to the pellet and resuspend by
  pipetting up and down. Incubate tubes at 4°C for

  \     30 minutes with constant mixing.

  7.   Centrifuge tubes at 16,000 × g for 15 minutes at 4°C. Transfer
  supernatant containing solubilized membrane and

  \     membrane-associated proteins to a new tube.

  8.   Proceed to downstream application. Immediately use cytosolic and membrane
  fractions stored on ice or store aliquots at

  \     -80°C for future use.


  Protocol 2: Suspension Mammalian Cells

  1.   Harvest 5 × 106 cells by centrifugation at 300 × g for 5 minutes. Wash
  harvested cell pellet with 3mL of Cell Wash

  \     Solution and centrifuge at 300 × g for 5 minutes.

  2.   Carefully remove and discard the supernatant. Resuspend the cells in
  1.5mL of Cell Wash Solution and transfer to a

  \     2mL centrifuge tube. Centrifuge at 300 × g for 5 minutes and discard
  supernatant.

  3.   Add 0.75mL of Permeabilization Buffer to the cell pellet. Vortex briefly
  to obtain a homogeneous cell suspension.

  \     Incubate 10 minutes at 4oC with constant mixing.

  4.   Centrifuge permeabilized cells for 15 minutes at 16,000 × g. Carefully
  remove the supernatant containing cytoslic

  \     proteins and transfer to a new tube.



