  Number                            Description

  89842                             Mem-PER Plus Membrane Protein Extraction
  Kit, contains sufficient lysis and extraction reagents

  \                                  for approximately 50 mammalian cell pellet
  fractions containing 5 × 106 cells each or 25 tissue

  \                                  samples containing 20-40mg of tissue


  \                                  Kit Contents:

  \                                  Cell Wash Solution, 225mL; store at 4°C

  \                                  Solubilization Buffer, 25mL; store at 4°C

  \                                  Permeabilization Buffer, 50mL; store at
  -20°C


  \                                  Storage: Upon receipt store Cell Wash
  Solution and Solubilization Buffer at 4°C. Aliquot and store

  \                                  Permeabilization Buffer at -20°C to avoid
  freeze/thaws. Product is shipped on ice.



