  Introduction

  The Thermo Scientific™ Mem-PER™ Plus Membrane Protein Extraction Kit is used
  for the enrichment of integral

  membrane proteins and membrane-associated proteins from cultured mammalian
  cells or tissue. The kit uses a mild

  detergent-based, selective extraction protocol, which eliminates the hassle of
  phase separation based on hydrophobicity,

  allowing better reproducibility and higher throughput.

  The cells are permeabilized with a mild detergent to allow the release of
  soluble cytosolic proteins. A second detergent then

  solubilizes membrane proteins. Extraction efficiencies will vary depending on
  the number of times the integral membrane

  protein(s) of interest spans the lipid bilayer. Membrane proteins with at
  least 1-2 transmembrane domains are typically

  extracted with an efficiency of up to 90%. Cross-contamination of cytosolic
  proteins into the membrane fraction is usually

  less than 10%.



  Important Product Information

  •     For optimal results, include protease and phosphatase inhibitors (e.g.,
  Product No. 78440) in the Permeabilization and

  \      Solubilization Buffers.

  •     To directly quantify proteins in the cytosolic and/or membrane fraction,
  use a protein assay such as the Thermo

  \      Scientific™ BCA Protein Assay (Product No. 23225), Micro BCA™ Protein
  Assay (Product No. 23235) or Pierce™

  \      660nm Protein Assay (Product No. 22660).



