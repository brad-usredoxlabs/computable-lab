  Protocol 3: Soft Tissue

  1.   Place 20-40mg of soft tissue in a 5mL microcentrifuge tube. Add 4mL of
  Cell Wash Solution to the tissue, vortex briefly

  \     and discard wash.

  2.   Transfer to a 2mL tissue grinder and cut the tissue into small pieces
  with a pair of scissors. Add 1mL of permeabilization

  \     buffer to the tissue and homogenize until an even suspension is obtained
  (6-10 strokes).

  3.   Add 1mL of Permeabilization Buffer and transfer homogenate to a new tube,
  incubating for 10 minutes at 4°C with

  \     constant mixing.

  \     Optional: Remove non-homogenized tissue using the protocol provided with
  the Thermo Scientific™ Pierce™ Tissue

  \     Strainers (Product No. 87791) before pelleting permeabilized cells.

  4.   Centrifuge at 16,000 × g for 15 minutes at 4°C to pellet permeabilized
  cells. Carefully remove the supernatant containing

  \     cytosolic proteins and transfer to a new tube.

  5.   Resuspend the pellet in 1mL of Solubilization Buffer. Pipette up and down
  to obtain a homogeneous suspension.

  \     Incubate 30 minutes at 4°C with constant mixing.

  6.   Centrifuge tubes at 16,000 × g for 15 minutes at 4°C. Transfer
  supernatant containing solubilized membrane and

  \     membrane-associated proteins to a new tube.

  7.   Proceed to downstream application. Immediately use cytosolic and membrane
  fractions stored on ice or store aliquots at

  \     -80°C for future use.


  Protocol 4: Hard Tissue

  1.   Place 20-40mg of hard tissue in a 5mL microcentrifuge tube. Add 4mL of
  Cell Wash Solution to the tissue, vortex

  \     briefly and discard the wash.

  2.   Add 1mL of Permeabilization Buffer to the tissue and cut the tissue into
  small pieces with a pair of scissors.

  3.   Homogenize minced tissue with a hand-held Polytron Homogenizer. Use a low
  setting (to prevent foaming) until an even

  \     suspension is obtained.

  4.   Add an additional 1mL of Permeabilization Buffer to the homogenate and
  incubate for 10 minutes on ice with constant

  \     mixing.

  \     Optional: Remove non-homogenized tissue using protocol provided with the
  Pierce Tissue Strainers before pelleting

  \     permeabilized cells.

  5.   Centrifuge at 16,000 × g for 15 minutes at 4°C to pellet permeabilized
  cells. Carefully remove the supernatant containing

  \     cytosolic proteins and transfer to a new tube.

  6.   Resuspend the pellet in 1mL of Solubilization Buffer. Pipette up and down
  to obtain a homogeneous suspension.

  \     Incubate 30 minutes at 4°C with constant mixing.

  7.   Centrifuge tubes at 16,000 × g for 15 minutes at 4°C. Transfer
  supernatant containing solubilized membrane and

  \     membrane-associated proteins to a new tube.

  8.   Proceed to downstream application. Immediately use cytosolic and membrane
  fractions stored on ice or store aliquots at

  \     -80°C for future use.





