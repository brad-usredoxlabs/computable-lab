  function salvageAiPrecompileOutput(input: { raw?: string | object; parsed?:
  unknown }): AiPrecompileOutput {
    // Default empty output to prevent shape mismatch
    const emptyOutput: AiPrecompileOutput = {
      candidateLabwares: [],
      patternEvents: [],
      downstreamCompileJobs: [],
    };

    if (!input.raw && !input.parsed) {
      return emptyOutput;
    }

    let parsed: unknown;

    // If raw is a string, try to parse it as JSON
    if (typeof input.raw === 'string') {
      try {
        parsed = JSON.parse(input.raw);
      } catch (e) {
        // If parsing fails, treat as invalid input
        return emptyOutput;
      }
    } else if (input.raw && typeof input.raw === 'object') {
      parsed = input.raw;
    } else if (input.parsed) {
      parsed = input.parsed;
    } else {
      return emptyOutput;
    }

    // If parsed is not an object, return empty output
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
      return emptyOutput;
    }

    const obj = parsed as Record<string, unknown>;

    // Extract candidateLabwares
    const candidateLabwares = Array.isArray(obj.candidateLabwares)
      ? obj.candidateLabwares as CandidateLabware[]
      : [];

    // Extract patternEvents
    const patternEvents = Array.isArray(obj.patternEvents)
      ? obj.patternEvents as PatternEvent[]
      : [];

    // Extract downstreamCompileJobs
    const downstreamCompileJobs = Array.isArray(obj.downstreamCompileJobs)
      ? obj.downstreamCompileJobs as DownstreamCompileJob[]
      : [];

    return {
      candidateLabwares,
      patternEvents,
      downstreamCompileJobs,
    };
  }

