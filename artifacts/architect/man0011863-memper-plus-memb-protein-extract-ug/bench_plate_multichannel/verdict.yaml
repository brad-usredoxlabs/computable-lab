  - id: fix-deterministic-fallback-from-presegmented
    class: compiler_event_coverage
    title: Add deterministic fallback to lower presegmented candidates to events
      when ai_precompile fails
    rationale: Even after fixing the shape mismatch, the ai_precompile pass may
      still fail for edge cases. The compiler currently has no deterministic
      fallback path to convert presegmented candidates (which are already
      extracted entities with protocol-action evidence) into candidateEvents.
      The diagnostics show 55 deterministic candidates were supplied across
      chunks, but these are never converted to events because the ai_precompile
      pass is the sole gate. A deterministic fallback in ChatbotCompilePasses.ts
      should detect when ai_precompile produces empty candidateEvents and
      presegmented candidates exist, then use DeterministicPrecompilePass logic
      to lower those candidates to basic events (e.g., aspirate, dispense,
      incubate, centrifuge based on verb patterns in candidate text). This
      ensures the compiler never produces zero events when presegmented evidence
      exists.
    ownedFiles:
      - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
      - server/src/compiler/pipeline/passes/DeterministicPrecompilePass.ts
    acceptance:
      - When ai_precompile.candidateEvents is empty but presegmented candidates
        exist, a fallback pass produces at least 3 candidateEvents
      - eventCount >= 3 for protocols with presegmented candidates but failed
        ai_precompile
      - Fallback events include correct verb types (aspirate, dispense,
        incubate, centrifuge) based on candidate text patterns
      - "No regression: protocols with successful ai_precompile continue to use
        ai_precompile output"
