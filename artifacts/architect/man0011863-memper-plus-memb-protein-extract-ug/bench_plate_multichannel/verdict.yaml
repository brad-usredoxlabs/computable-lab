        presegmented candidates exist
      - expand_biology_verbs pass is no longer skipped (when condition evaluates
        to true)
      - eventCount >= 3 for this protocol after the fix
      - tag_prompt JSON parse errors are handled gracefully with retry or
        fallback parsing
