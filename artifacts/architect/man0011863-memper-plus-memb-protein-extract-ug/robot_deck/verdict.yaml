      snapshot' gaps for generic labware hints like 'generic_96_well_plate',
      'generic_24x1_5ml_tube_rack', and 'generic_12_well_reservoir'. These are
      standard labware types that should be resolvable. The Foundry runtime
      (ProtocolFoundryCompileRunner.ts) creates a labwareLookup from the
