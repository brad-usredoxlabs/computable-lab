  - id: fix-resolve-references-unknown-kind
    class: precompiler_reference_shape
    title: Handle 'unknown' kind refs in resolve_references pass
    rationale: The compiler output shows gaps with 'kind unknown not handled by
      resolve_references'. The resolve_references pass in
      ChatbotCompilePasses.ts has a switch statement that only handles
      'protocol', 'assay', 'pattern', and 'compound-class' kinds. Any other kind
      (including 'unknown', 'labware', 'material', or empty string) falls
      through to the default case which marks them as unresolvable with reason
      'kind X not handled by resolve_references'. The ai_precompile output is
      producing unresolvedRefs with kind 'unknown' or empty kind, which should
      either be resolved as labware/material references or have a more specific
      kind assigned. The fix should add handling for 'labware' and 'material'
      kinds in the resolve_references pass, or normalize 'unknown' kinds in the
      ai_precompile salvage logic to have a proper kind before reaching
      resolve_references.
    ownedFiles:
      - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
    acceptance:
      - resolve_references pass handles 'labware' and 'material' kinds by
        delegating to appropriate registries
      - "'unknown' kind refs are normalized to a specific kind
        (labware/material) in ai_precompile salvage logic"
      - No 'kind unknown not handled by resolve_references' gaps in compiler
