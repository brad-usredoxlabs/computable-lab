  - id: fix-deterministic-candidate-to-event-lowering
    class: compiler_event_coverage
    title: Lower deterministic presegmented candidates to candidateEvents when
      ai_precompile fails
    rationale: The diagnostics show 66 deterministic candidates were extracted
      (11+43+12) but none were converted to events because the ai_precompile
      pass failed to produce candidateEvents. The compiler has a fallback
      mechanism but it appears to produce an empty candidateEvents array. We
      need to ensure that when ai_precompile fails, the deterministic candidates
      (which contain protocol-action evidence) are automatically lowered to
      candidateEvents using the BiologyVerbExpander. This requires wiring the
      deterministic candidate output to the candidateEvents field in the
      fallback AiPrecompileOutput, and ensuring the expand_biology_verbs pass
      can process these candidates.
    ownedFiles:
      - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
      - server/src/compiler/biology/BiologyVerbExpander.ts
    acceptance:
      - When ai_precompile produces no candidateEvents, deterministic candidates
        from extract_entities pass are used as fallback
      - Deterministic candidates with protocol-action evidence are converted to
        candidateEvents with appropriate verb types
      - The expand_biology_verbs pass processes these fallback candidateEvents
        and produces concrete events
      - eventCount >= 3 for the Mem-PER Plus protocol which has clear
        centrifugation, resuspension, and incubation steps
      - Labware references (5mL microcentrifuge tubes, cell scraper) are
        resolved from deterministic candidates
