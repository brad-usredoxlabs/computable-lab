  - id: fix-unknown-biology-verbs
    class: compiler_event_coverage
    title: "Register expanders for unknown biology verbs: bind, prefer, use, report,
      continue"
    rationale: The compiler drops candidate events because it has no registered
      expanders for verbs 'bind', 'prefer', 'use', 'report', and 'continue'.
      These verbs appear in the pre-compiler's extracted candidates but cannot
      be lowered to protocol events. For this GC-FID protocol, 'use' likely maps
      to pipette/transfer operations, 'bind' may map to labware mounting, and
      'continue' may be a no-op or sequencing directive. Adding these verb
      expanders will allow the compiler to generate events from the extracted
      candidates.
    ownedFiles:
