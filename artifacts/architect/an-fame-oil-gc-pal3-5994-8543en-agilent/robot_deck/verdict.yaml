  - id: fix-unknown-verbs-bind-prefer-use-report
    class: compiler_event_coverage
    title: Add verb expanders for bind, prefer, use, report, continue
    rationale: The compiler drops candidate events because verbs 'bind', 'prefer',
      'use', 'report', and 'continue' have no registered expanders in
      BiologyVerbExpander.ts. These are common verbs in GC-FID protocols (e.g.,
      'use PAL3 autosampler', 'bind column', 'report results'). Without
      expanders, all candidates using these verbs are discarded, contributing to
      eventCount=0.
    ownedFiles:
      - server/src/compiler/biology/BiologyVerbExpander.ts
    acceptance:
      - Verb 'use' maps to a pipette or instrument configuration event
      - Verb 'bind' maps to a labware mounting or column installation event
      - Verb 'prefer' is handled as a no-op or configuration hint without
        dropping the event
      - Verb 'report' maps to a data acquisition or analysis event
      - Verb 'continue' is handled as a no-op or sequence continuation without
        dropping the event
      - unknown_biology_verb warnings for these verbs are eliminated from
        diagnostics
