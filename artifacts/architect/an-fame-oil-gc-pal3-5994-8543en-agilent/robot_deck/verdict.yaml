  - id: fix-ai-precompile-shape-mismatch
    class: precompiler_reference_shape
    title: Fix ai_precompile output shape mismatch to enable downstream passes
    rationale: "The compiler diagnostics show 'ai_precompile output shape mismatch',
      which causes the ai_precompile output to be invalid. This cascades to skip
      critical passes: 'mint_materials', 'resolve_labware',
      'resolve_prior_labware_references', and 'expand_patterns' are all skipped
      because their 'when' conditions evaluate to false (e.g.,
      'outputs.ai_precompile.mintMaterials' is false). Without these passes, no
      events can be generated, resulting in eventCount=0. The pre-compiler must
      produce a correctly shaped output that the compiler can consume."
    ownedFiles:
