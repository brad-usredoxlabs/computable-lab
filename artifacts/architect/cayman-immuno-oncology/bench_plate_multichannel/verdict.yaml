    class: precompiler_reference_shape
    title: Fix ai_precompile output shape mismatch to enable downstream passes
    rationale: "The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
      pre-compiler's output schema doesn't match what the compiler expects. This
      causes critical downstream passes to be skipped: 'resolve_labware'
      (because candidateLabwares is missing/false), 'expand_patterns', and
      'emit_downstream_queue'. Without these passes, labware can't be resolved
