  - id: fix-catalog-protocol-event-generation
    class: compiler_event_coverage
    title: Add compiler support for catalog-to-event lowering for screening libraries
    rationale: The PDF is a product catalog listing compounds in a 96-well plate
      layout, not a step-by-step protocol. The compiler currently expects
      procedural instructions (volumes, incubation times) and produces a
      clarification gap. The compiler needs a new lowering path that converts
      catalog entries (well-position + compound name + item number) into
      material minting and plate-population events. This would generate events
      like 'mint_compound PLX4032' and 'populate_well A2 with PLX4032' for each
      catalog entry.
    ownedFiles:
      - server/src/protocol-foundry/passes/expand_patterns.ts
      - server/src/protocol-foundry/passes/mint_materials.ts
      - server/src/protocol-foundry/verbs/catalog-lowering.ts
