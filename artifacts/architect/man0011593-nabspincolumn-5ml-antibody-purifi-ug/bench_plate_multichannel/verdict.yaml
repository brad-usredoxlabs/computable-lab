  - id: fix-ai-precompile-fallback-shape
    class: precompiler_reference_shape
    title: Fix ai_precompile fallback to produce non-empty candidateEvents when
      tag_prompt JSON fails
    rationale: The compiler diagnostics show 'ai_precompile output shape mismatch,
      using fallback' followed by all downstream passes being skipped because
      outputs.ai_precompile.candidateEvents evaluated to false. The root cause
      is that when the tag_prompt LLM response is malformed JSON (Unterminated
      string), the ai_precompile pass falls back to an empty/default shape
      instead of attempting to recover candidates from the deterministic
      presegmented text. The pre-compiler already supplied 12+6+16+5=39
      deterministic candidates, but the ai_precompile pass's fallback path
      produces an empty candidateEvents array, causing all verb expansion,
      labware resolution, and pattern expansion passes to be skipped. The fix
      must ensure the fallback path in createAiPrecompilePass still populates
      candidateEvents from the deterministic candidates when the LLM response is
      invalid.
    ownedFiles:
      - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
    acceptance:
      - When tag_prompt returns invalid JSON, the ai_precompile fallback must
        still produce candidateEvents from deterministic presegmented candidates
      - eventCount must be >= 3 for protocols with clear procedural steps in the
        PDF text
      - The 'expand_biology_verbs' pass must not be skipped when deterministic
        candidates exist
      - The 'resolve_labware' pass must not be skipped when candidateLabwares
        can be derived from deterministic candidates
