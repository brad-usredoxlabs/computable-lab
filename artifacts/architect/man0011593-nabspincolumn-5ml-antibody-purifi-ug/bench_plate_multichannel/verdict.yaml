  - id: fix-tag-prompt-json-resilience
    class: extractor_prompt_contract
    title: Make tag_prompt LLM response parsing resilient to truncated/malformed JSON
    rationale: The tag_prompt pass fails with 'Unterminated string in JSON at
      position 669', indicating the LLM response was truncated or contained
      unescaped characters. This malformed JSON causes the entire ai_precompile
      output to be invalid, triggering the shape mismatch fallback. The fix
      should add JSON repair logic (e.g., attempting to close unclosed
      strings/arrays, or using a lenient JSON parser) before declaring the
      response invalid. This prevents cascading failures where a single
      malformed LLM response nullifies all deterministic candidate extraction.
    ownedFiles:
      - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
    acceptance:
      - tag_prompt pass must not emit 'tag_prompt_parse_error' warnings for
        recoverable JSON truncation
      - Partial but valid tagged phrases should be extracted even if the JSON is
        truncated mid-string
      - The ai_precompile pass should receive valid structured output from
        tag_prompt even when the LLM response is imperfect
