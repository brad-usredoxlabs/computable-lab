  - id: fix-ai-precompile-shape-mismatch-and-fallback
    class: precompiler_reference_shape
    title: Fix ai_precompile shape mismatch fallback to produce candidateEvents from
      deterministic candidates
    rationale: The compiler diagnostics show 'ai_precompile output shape mismatch,
      using fallback' followed by all downstream passes being skipped because
      outputs.ai_precompile.candidateEvents evaluated to false. The pre-compiler
      supplied 13+6+16+5=40 deterministic candidates across chunks, but the
      ai_precompile pass failed to shape them into the expected output
      structure. The fallback path produces an empty or malformed
      AiPrecompileOutput, causing candidateEvents to be falsy. This means the
      compiler never reaches expand_biology_verbs, resolve_labware, or any
      event-producing pass. The root cause is in ChatbotCompilePasses.ts where
      createAiPrecompilePass handles shape mismatches — the fallback must
      synthesize candidateEvents from the deterministic candidates that were
      already extracted, rather than returning an empty structure.
    ownedFiles:
      - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
    acceptance:
      - When ai_precompile output has a shape mismatch, the fallback path must
        produce a valid AiPrecompileOutput with candidateEvents populated from
        deterministic candidates.
      - The expand_biology_verbs pass must no longer be skipped when
        deterministic candidates exist.
      - eventCount must be >= 3 for protocols with clear procedural steps in the
        PDF text.
      - The ai_precompile_shape_mismatch warning should still be emitted but
        should not result in zero events when candidates are available.
