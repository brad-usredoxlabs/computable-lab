  - id: fix-tag-prompt-json-parse-error
    class: extractor_prompt_contract
    title: Fix tag_prompt JSON parse error from unterminated string in LLM response
    rationale: "The diagnostics show 'tag_prompt response was not valid JSON:
      Unterminated string in JSON at position 645' with a raw_preview showing
      the response was cut off mid-JSON. This truncation likely causes the
      ai_precompile pass to receive incomplete or malformed input, contributing
      to the shape mismatch. The tag_prompt pass needs to handle truncated LLM
      responses more gracefully — either by retrying with a smaller chunk, by
      repairing the JSON (closing unclosed strings/brackets), or by falling back
      to deterministic extraction when the LLM response is malformed. This is a
      secondary fix that improves robustness of the pre-compiler pipeline."
    ownedFiles:
      - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
    acceptance:
      - When tag_prompt receives a truncated JSON response, the pass should
        either repair the JSON or fall back to deterministic candidates without
        crashing.
      - No 'tag_prompt_parse_error' warnings should result in complete loss of
        candidate extraction.
      - The ai_precompile pass should receive valid input even when tag_prompt
        output is partially malformed.
