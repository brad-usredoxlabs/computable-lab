    class: precompiler_reference_shape
    title: Ensure precompiler extracts structured plate-map candidates with
      well-position and compound fields
    rationale: "The precompiler diagnostics show many
      'foundry_presegmented_candidates' messages but the candidates are not
      being lowered to events. The precompiler needs to explicitly tag
      candidates with a 'plateMapEntry' kind that includes structured fields:
      wellPosition (e.g., 'A2'), compoundName (e.g., 'Ursolic Acid'), and
