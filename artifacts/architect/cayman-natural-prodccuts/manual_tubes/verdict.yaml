  - id: add-library-inventory-lowering-pass
    class: compiler_event_coverage
    title: Add compiler lowering pass for library inventory / plate-map protocols
    rationale: "The compiler currently treats this PDF as a protocol with no
      actionable steps because it only contains a plate map (well-to-compound
      mapping). The gap message explicitly states that no experimental steps
      were found. However, a library inventory IS a valid protocol type: it
      defines the contents of a 96-well plate. The compiler needs a new lowering
      pass that recognizes plate-map/inventory protocols and generates events to
      populate a 96-well plate with the specified compounds at each well
      position. This would produce events like 'load_compound_into_well' or
      'set_plate_map' for each well entry."
    ownedFiles:
      - server/src/compiler/lowering/plate-map-lowering.ts
      - server/src/compiler/lowering/index.ts
      - server/src/compiler/protocol-types.ts
