  - id: wire-presegmented-candidates-to-compiler-state
    class: foundry_runtime_wiring
    title: Wire presegmented candidates into compiler state so events are generated
    rationale: The compiler output shows 'foundry_presegmented_candidates'
      diagnostics, meaning the presegmented extraction service ran and found
      candidates. However, eventCount is 0. The root cause is that
      `presegmentedExtractionService` in `ProtocolFoundryCompileRunner.ts`
      returns candidates, but the `runChatbotCompile` function (in
      `server/src/ai/runChatbotCompile.ts`) likely does not inject these
      candidates into the compiler state's `extract_entities` pass result. The
      compiler pipeline expects `state['extract_entities']` to contain
      `candidateEvents`. If this state key is missing or empty, the subsequent
      `ai_precompile` pass (in `ChatbotCompilePasses.ts`) has no candidates to
      process, resulting in 0 events. The fix is to ensure the extraction
      service result is properly merged into the compiler state before the
      pipeline runs.
    ownedFiles:
      - server/src/ai/runChatbotCompile.ts
      - server/src/foundry/ProtocolFoundryCompileRunner.ts
    acceptance:
      - Compiler output eventCount > 0 for protocols with presegmented
        candidates.
      - Diagnostics no longer show 'extractor_repair_exhausted' or
        'ai_precompile_shape_mismatch' for this protocol.
      - Event graph contains at least one event derived from the presegmented
        candidates.
