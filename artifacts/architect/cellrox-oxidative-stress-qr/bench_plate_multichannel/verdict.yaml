  - id: fix-ai-precompile-shape-mismatch
    class: precompiler_reference_shape
    title: Fix ai_precompile output shape mismatch to enable labware and pattern
      resolution
    rationale: "The compiler reports 'ai_precompile output shape mismatch' which
      causes downstream passes to skip: 'resolve_labware' is skipped because
      'outputs.ai_precompile.candidateLabwares' evaluated to false, and
      'expand_patterns' is skipped because 'outputs.ai_precompile.patternEvents'
      evaluated to false. This means the ai_precompile pass in
      ChatbotCompilePasses.ts is producing an output object whose shape doesn't
      match what downstream passes expect. The AiPrecompileOutput type likely
      requires candidateLabwares and patternEvents fields that are missing or
      malformed. This is the root cause of the unresolved labware refs
      (generic_96_well_plate, generic_12_well_reservoir) because the
      resolve_labware pass never runs."
    ownedFiles:
      - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
    acceptance:
