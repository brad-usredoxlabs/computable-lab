title: Register expanders for bind, prefer, use, report verbs in BiologyVerbExpander
rationale: The compiler drops all candidate events because the verbs 'bind',
  'prefer', 'use', and 'report' have no registered expanders in
  BiologyVerbExpander.ts. These are common protocol verbs that should map to
  standard pipetting or plate-setup actions. Without expanders, all candidates
  are dropped, resulting in zero events. The pre-compiler extracted 9+3+3=15
  candidates, but none survive to the event graph.
