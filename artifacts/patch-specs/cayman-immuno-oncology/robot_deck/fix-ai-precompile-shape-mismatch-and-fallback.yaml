  - ai_precompile pass output shape matches expected schema with candidateEvents
    array populated
  - candidateEvents contains at least 3 events for the 96-well plate compound
    dispensing steps
  - expand_biology_verbs pass is no longer skipped (when condition evaluates to
    true)
  - resolve_labware pass is no longer skipped (when condition evaluates to true)
  - eventCount >= 3 in compiler output
  - outcome is 'complete' not 'gap'
