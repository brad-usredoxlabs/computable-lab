title: Fix ai_precompile shape mismatch and ensure candidateEvents are populated
  from presegmented candidates
rationale: The compiler diagnostics show 'ai_precompile output shape mismatch,
  using fallback' and 'candidateEvents evaluated to false', causing all
  downstream passes (expand_biology_verbs, resolve_labware, mint_materials) to
  be skipped. The pre-compiler extracted 15 deterministic candidates (9+3+3)
  from the well-plate mapping table, but the ai_precompile pass failed to
  convert these into candidateEvents. The root cause is that the ai_precompile
  pass's output shape doesn't match what downstream passes expect, or the
  fallback path produces empty candidateEvents. Since this is a screening
  library plate (96-well with compound mappings), the compiler should generate
  events for each compound dispensing step. The prior patch touched
  ChatbotCompilePasses.ts but the issue persists, suggesting the fix was
  incomplete or the fallback path still produces empty results.
