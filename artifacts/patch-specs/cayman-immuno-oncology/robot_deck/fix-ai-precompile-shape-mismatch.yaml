protocolId: cayman-immuno-oncology
variant: robot_deck
fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: The compiler reports 'ai_precompile output shape mismatch', which
  causes all downstream passes (mint_materials, resolve_labware,
  expand_patterns) to be skipped because their 'when' conditions evaluate to
  false. The ai_precompile pass in ChatbotCompilePasses.ts is producing output
  that doesn't match the expected AiPrecompileOutput schema, preventing the
  pipeline from extracting candidate events, labwares, or materials. This is the
  root cause of the zero-event output.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass no longer emits 'ai_precompile_shape_mismatch' warning
  - outputs.ai_precompile.candidateEvents is a non-empty array when candidates
    exist
  - outputs.ai_precompile.candidateLabwares is populated when labware hints are
    present
  - Downstream passes (mint_materials, resolve_labware) are no longer skipped
    due to false when conditions
