fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: "The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
  pre-compiler's output schema doesn't match what the compiler expects. This
  causes critical downstream passes to be skipped: 'resolve_labware' (because
  candidateLabwares is missing/false), 'expand_patterns', and
  'emit_downstream_queue'. Without these passes, labware can't be resolved and
  the event graph remains incomplete. The pre-compiler must output a shape that
  includes candidateLabwares, patternEvents, and downstreamCompileJobs fields
  even if empty arrays."
ownedFiles:
  - server/src/protocol-foundry/precompiler/ai-precompile.ts
  - server/src/protocol-foundry/precompiler/schema.ts
acceptance:
  - ai_precompile output includes 'candidateLabwares' array (can be empty)
  - ai_precompile output includes 'patternEvents' array (can be empty)
  - ai_precompile output includes 'downstreamCompileJobs' array (can be empty)
  - resolve_labware pass is no longer skipped due to missing candidateLabwares
  - No 'ai_precompile_shape_mismatch' warning in compiler diagnostics
