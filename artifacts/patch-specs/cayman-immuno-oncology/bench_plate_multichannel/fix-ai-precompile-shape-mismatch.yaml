fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch to enable labware and pattern passes
rationale: The compiler diagnostics show 'ai_precompile output shape mismatch',
  which causes downstream passes (resolve_labware, expand_patterns,
  emit_downstream_queue) to be skipped because their 'when' conditions evaluate
  to false. This is the root cause of unresolved labware refs and missing
  biological events. The ai_precompile pass in ChatbotCompilePasses.ts is
  producing an output that doesn't match the expected AiPrecompileOutput shape,
  preventing the compiler from extracting candidateLabwares, patternEvents, and
  downstreamCompileJobs.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass no longer emits 'ai_precompile_shape_mismatch' warning
  - resolve_labware pass is no longer skipped
    (outputs.ai_precompile.candidateLabwares is truthy)
  - expand_patterns pass is no longer skipped
    (outputs.ai_precompile.patternEvents is truthy)
  - Compiler outcome changes from 'gap' to 'complete' or 'error' with actionable
    diagnostics
