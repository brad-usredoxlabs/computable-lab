protocolId: cayman-immuno-oncology
variant: bench_plate_multichannel
fixClass: material_catalog_or_spec_gap
title: Resolve protocol materials as catalog/spec data without inventing inventory
rationale: Compiler evidence points at unresolved reagents, buffers,
  formulations, vendor products, or material tags that should be represented as
  reusable YAML data or material resolver behavior.
ownedFiles:
  - records/material
  - records/seed/materials
  - schema/lab/material.schema.yaml
  - schema/lab/material-spec.schema.yaml
  - schema/lab/vendor-product.schema.yaml
  - server/src/compiler/material
  - server/src/materials
acceptance:
  - Adds or improves only material, material-spec, vendor-product, or material
    resolver/catalog data needed by the source protocol.
  - Does not create or modify labware-definition YAML; containers, tubes,
    plates, racks, reservoirs, tips, and other physical holders must go through
    a labware-specific fix class.
  - Does not create material-instance, aliquot, material-lot, physical
    inventory, source-tube, or run-specific records from vendor PDF evidence.
  - Uses ontology refs only when a CURIE/IRI is present in local records or
    source artifacts; otherwise marks the material as vendor/provenance-backed
    with an ontology backfill need.
  - Compiler diagnostics for the protocol show fewer unresolved
    material/catalog/spec failures, or the patch adds a focused regression
    documenting the remaining blocker.
implementationBudget:
  targetChangedFiles: 1
  maxChangedFiles: 3
  targetChangedLines: 80
  maxChangedLines: 220
  requireFocusedFixture: true
coderModelProfile:
  model: Qwen/Qwen3.6-35B-A3B-FP8
  guidance: Narrow ownership, concrete evidence, one behavior change.
contextHints:
  - Everything that can be data should be YAML data in records/ or schema
    registry files.
  - A vendor PDF can justify material, material-spec/formulation,
    vendor-product, and labware definition/product facts.
  - A vendor PDF cannot prove that this lab has a tube, aliquot, lot, prepared
    source, or sample provenance.
  - Material records describe substances/reagents/concepts such as antibodies,
    buffers, substrates, and stop solutions. They must not describe plates,
    tubes, racks, reservoirs, or tips.
  - The unattended coder does not have a live OLS/ChEBI lookup tool in this
    patch lane; do not invent ontology identifiers.
  - Prefer one reagent family or one vendor kit component family per patch.
  - If the unresolved item is a plate, tube rack, reservoir, tip rack, or other
    existing labware definition that is not being found, use the
    labware_alias_or_resolver_gap lane instead of adding a new record.
doNotTouch:
  - Do not rewrite the pipeline end to end.
  - Do not create real material-instance, aliquot, or physical inventory records
    from vendor PDF evidence.
