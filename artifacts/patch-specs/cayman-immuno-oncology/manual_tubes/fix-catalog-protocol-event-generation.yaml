  - server/src/protocol-foundry/passes/mint_materials.ts
  - server/src/protocol-foundry/verbs/catalog-lowering.ts
acceptance:
  - Compiler generates at least one event per catalog entry (compound + well
    position)
  - Each compound from the PDF (PLX4032, I-BET762, etc.) is minted as a material
  - Well positions (A2, A3, etc.) are mapped to plate coordinates in events
  - eventCount >= 20 for this 96-well catalog protocol
