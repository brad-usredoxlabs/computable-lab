title: Fix ai_precompile output shape mismatch causing downstream pass skips
rationale: The compiler diagnostics show 'ai_precompile_shape_mismatch' warning,
  which causes all downstream passes (mint_materials, apply_directives,
  resolve_labware, expand_patterns) to be skipped because their 'when'
  conditions evaluate to false. The ai_precompile pass in
  ChatbotCompilePasses.ts is not producing the expected output shape, preventing
  the compiler from extracting protocol actions from the PDF text. This is the
  root cause of the low event count (2) and the 'gap' outcome.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass produces output with correct shape including
    candidateLabwares, mintMaterials, directives, and patternEvents fields
  - Downstream passes (mint_materials, resolve_labware, expand_patterns) are no
    longer skipped due to false 'when' conditions
  - Compiler event count increases from 2 to at least 3 for protocols with
    extractable steps
