fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch causing downstream pass skips
rationale: The compiler diagnostics show 'ai_precompile_shape_mismatch', which
  caused all downstream passes (mint_materials, apply_directives,
  resolve_labware, expand_patterns) to be skipped because their 'when'
  conditions evaluated to false. The pre-compiler extracted 7+3+3 candidates but
  the ai_precompile pass failed to produce the expected output shape, resulting
  in only 2 generic wash events instead of compound-specific events. This is the
  root cause of the low event count and gap outcome.
ownedFiles:
  - server/src/protocol-foundry/passes/ai_precompile.ts
  - server/src/protocol-foundry/passes/ai_precompile.schema.ts
acceptance:
  - ai_precompile pass produces output matching the expected schema shape for
    catalog-type protocols
  - Downstream passes (mint_materials, resolve_labware) are no longer skipped
    due to shape mismatch
  - eventCount increases beyond 2 for protocols with extractable compound/well
    mappings
