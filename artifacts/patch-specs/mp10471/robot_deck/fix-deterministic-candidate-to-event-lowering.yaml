protocolId: mp10471
variant: robot_deck
fixClass: compiler_event_coverage
title: Lower deterministic presegmented candidates to events when LLM precompile fails
rationale: The diagnostics show 8, 10, 24, 25, 1, and 4 deterministic candidates
  were extracted from presegmented text, but these are never converted to events
  because the ai_precompile pass fails and returns empty candidateEvents. The
  compiler should have a fallback path that converts deterministic candidates
  (which represent protocol steps) into basic events even when the LLM
  precompile fails. This ensures protocols with clear procedural content produce
  at least some events.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
  - server/src/compiler/biology/BiologyVerbExpander.ts
acceptance:
  - When ai_precompile fails, deterministic candidates should be lowered to
    basic events
  - Event graph should contain at least 3 events for protocols with clear
    procedural steps
  - Events should reference extracted labware and materials from deterministic
    candidates
  - The expand_biology_verbs pass should process deterministic candidates when
    LLM candidates are empty
