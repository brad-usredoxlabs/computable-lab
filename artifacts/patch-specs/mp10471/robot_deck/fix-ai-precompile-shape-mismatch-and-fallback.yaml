fixClass: precompiler_reference_shape
title: Fix ai_precompile shape mismatch fallback to preserve candidateEvents
rationale: The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
  LLM's precompile output did not match the expected AiPrecompileOutput schema.
  The current fallback produces an empty output (no candidateEvents, no
  candidateLabwares), causing all downstream passes (expand_biology_verbs,
  resolve_labware, mint_materials) to be skipped. This results in eventCount=0
  despite the PDF containing clear protocol steps. The fallback should preserve
  any partially parsed data or use a deterministic extraction path instead of
  returning empty arrays.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - When ai_precompile output has shape mismatch, the fallback must not produce
    empty candidateEvents if deterministic candidates were extracted
  - The fallback should merge deterministic presegmented candidates into
    candidateEvents when LLM output is malformed
  - eventCount must be >= 3 for protocols with clear procedural steps in PDF text
  - Downstream passes (expand_biology_verbs, resolve_labware) must not be
    skipped when candidates exist
