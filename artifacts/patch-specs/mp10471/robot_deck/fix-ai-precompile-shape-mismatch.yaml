fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: The compiler diagnostics show 'ai_precompile output shape mismatch',
  which causes all downstream passes (mint_materials, apply_directives,
  resolve_labware, expand_patterns) to be skipped because their 'when'
  conditions evaluate to false. This is the root cause of the gap outcome. The
  ai_precompile pass in ChatbotCompilePasses.ts is producing output that doesn't
  match the expected AiPrecompileOutput type schema, preventing the compiler
  from extracting candidates, labwares, and directives needed to generate
  meaningful events.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass produces output matching AiPrecompileOutput type schema
  - No 'ai_precompile_shape_mismatch' warning in diagnostics
  - Downstream passes (mint_materials, resolve_labware) are no longer skipped
    due to false when conditions
  - candidateLabwares and directives fields are populated when present in LLM
    output
