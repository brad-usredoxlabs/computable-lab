fixClass: compiler_event_coverage
title: Add verb lowering for Fluo-4 assay preparation and loading steps
rationale: The PDF describes a calcium assay protocol with clear steps (prepare
  loading solution, add to cells, incubate, measure fluorescence), but the
  compiler only produces 2 empty mix events. The BiologyVerbExpander needs to
  recognize assay preparation verbs like 'prepare loading solution', 'add
  reagent to cells', 'incubate', and 'measure fluorescence' and lower them to
  appropriate liquid handling events (dispense, mix, incubate, read). Without
  these verb mappings, the compiler cannot generate meaningful events from the
  extracted candidates.
ownedFiles:
  - server/src/compiler/biology/BiologyVerbExpander.ts
acceptance:
  - Verb expander recognizes 'prepare loading solution' and lowers to
    dispense/mix events
  - Verb expander recognizes 'add reagent to cells' and lowers to dispense events
  - Verb expander recognizes 'incubate' and lowers to incubate events
  - Event count increases to at least 5 events for a complete assay protocol
  - Events include proper labware references (sample_plate, reagent_reservoir)
