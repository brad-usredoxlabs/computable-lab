title: Fix tag_prompt JSON parse error from truncated LLM response
rationale: "The diagnostics show 'tag_prompt response was not valid JSON:
  Unexpected end of JSON input' with a raw_preview that appears to be a valid
  JSON object that was cut off. This suggests the LLM response was truncated
  (possibly due to token limits or streaming issues) before the closing braces.
  The tag_prompt pass is likely used to extract tagged phrases (materials,
  labware, etc.) from the protocol text. When this fails, it may contribute to
  the ai_precompile shape mismatch because the tagged phrases are inputs to the
  precompile pass. The fix should add robust JSON parsing with truncation
  recovery (e.g., try to parse progressively shorter prefixes, or add missing
  closing braces) and/or increase the response token limit for the tag_prompt
  LLM call."
