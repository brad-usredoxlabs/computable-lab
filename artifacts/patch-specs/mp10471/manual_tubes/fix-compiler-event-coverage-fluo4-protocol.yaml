title: Add verb lowering for Fluo-4 Direct calcium assay protocol steps
rationale: "The event graph contains only 2 stub 'mix' events with empty
  details, which is insufficient for a calcium assay protocol. The PDF describes
  a multi-step protocol involving: (1) preparing working solutions from
  Components A, B, and C, (2) adding reagents to cells in culture media, (3)
  incubation steps, and (4) fluorescence measurement. The compiler lacks verb
  lowering rules for these biology operations (prepare_solution, add_reagent,
  incubate, measure_fluorescence). Without these verbs, the compiler cannot
  generate meaningful events from the extracted candidates."
