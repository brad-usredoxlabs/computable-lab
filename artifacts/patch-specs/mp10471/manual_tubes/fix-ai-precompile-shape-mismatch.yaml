fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch causing pass skips
rationale: "The compiler diagnostics show 'ai_precompile output shape mismatch'
  (ai_precompile_shape_mismatch). This caused downstream passes to be skipped:
  mint_materials, apply_directives, resolve_labware, and expand_patterns all had
  their 'when' conditions evaluate to false because the ai_precompile output
  fields (mintMaterials, directives, candidateLabwares, patternEvents) were
  malformed or missing. The pre-compiler extracted 25+ candidates but the AI
  precompile pass failed to shape them correctly, resulting in only 2 trivial
  mix events instead of the full protocol. The fix must ensure
  createAiPrecompilePass in ChatbotCompilePasses.ts produces a valid
  AiPrecompileOutput with properly populated fields when candidates exist."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile_shape_mismatch warning no longer appears in diagnostics for
    mp10471
  - mint_materials, apply_directives, resolve_labware, and expand_patterns
    passes are no longer skipped due to false when conditions
  - eventCount increases from 2 to at least 8 events covering the Fluo-4 Direct
    protocol steps (cell plating, reagent prep, loading, incubation, reading)
  - AiPrecompileOutput fields (mintMaterials, directives, candidateLabwares,
    patternEvents) are populated when candidates are extracted
