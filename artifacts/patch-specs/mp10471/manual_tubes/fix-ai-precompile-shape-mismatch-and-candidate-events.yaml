title: Fix ai_precompile shape mismatch to produce candidateEvents for Fluo-4
  Direct protocol
rationale: The compiler diagnostics show 'ai_precompile output shape mismatch,
  using fallback' and subsequently all downstream passes are skipped because
  'outputs.ai_precompile.candidateEvents evaluated to false'. The pre-compiler
  extracted 66+ deterministic candidates (6+10+24+25+1+4) but the ai_precompile
  pass failed to shape them into the expected AiPrecompileOutput structure with
  candidateEvents. The tag_prompt also had a JSON parse error ('Unexpected end
  of JSON input'), suggesting the LLM response was truncated or malformed. The
  root cause is that createAiPrecompilePass in ChatbotCompilePasses.ts either
  has a shape validation that is too strict, or the fallback path produces an
  empty/invalid structure that causes candidateEvents to be falsy. This results
  in 0 events despite clear protocol steps in the PDF (cell seeding, reagent
  preparation, incubation, measurement).
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass produces valid AiPrecompileOutput with non-empty
    candidateEvents array for mp10471
  - No 'ai_precompile_shape_mismatch' warning in diagnostics for mp10471
  - Downstream passes (expand_biology_verbs, resolve_labware, mint_materials)
    are no longer skipped due to falsy candidateEvents
  - eventCount >= 3 in compiler output for mp10471/manual_tubes
