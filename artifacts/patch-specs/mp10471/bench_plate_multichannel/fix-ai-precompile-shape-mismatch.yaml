title: Fix ai_precompile output shape mismatch causing pass skips
rationale: The compiler diagnostics show 'ai_precompile_shape_mismatch', which
  caused downstream passes 'mint_materials', 'resolve_labware', and
  'expand_patterns' to be skipped because their 'when' conditions evaluated to
  false. This is the root cause of the empty event graph (only 2 mix events) and
  unresolved labware refs. The ai_precompile pass is not producing the expected
  output shape (mintMaterials, candidateLabwares, patternEvents), so the
  compiler cannot proceed with material resolution, labware resolution, or
  pattern expansion.
