title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: "The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
  AI precompile pass produced output that doesn't match the expected schema.
  This caused critical downstream passes to be skipped: 'mint_materials' (no
  mintMaterials), 'resolve_labware' (no candidateLabwares), and
  'expand_patterns' (no patternEvents). Without these passes, the compiler
  cannot extract reagents, resolve labware, or expand protocol patterns,
  resulting in only 2 trivial mix events instead of a full calcium assay
  protocol."
