fixClass: precompiler_reference_shape
title: Fix ai_precompile shape mismatch and ensure candidateEvents are populated
  from deterministic candidates
rationale: The compiler output shows 'ai_precompile_shape_mismatch' warning,
  causing the fallback path to be used. This results in empty candidateEvents,
  which causes all downstream passes (expand_biology_verbs, resolve_labware,
  etc.) to be skipped via 'when' conditions. The pre-compiler extracted 70+
  deterministic candidates (7+10+24+25+1+4), but these are not being converted
  into candidateEvents by the ai_precompile pass. The tag_prompt also had a JSON
  parse error ('Unterminated string'), suggesting the LLM output is malformed.
  The root cause is that the ai_precompile pass in ChatbotCompilePasses.ts is
  not correctly shaping its output or handling the deterministic candidates from
  the presegmented extraction.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass produces valid AiPrecompileOutput with non-empty
    candidateEvents when deterministic candidates exist
  - No 'ai_precompile_shape_mismatch' warnings in diagnostics when candidates
    are present
  - Downstream passes (expand_biology_verbs, resolve_labware) are not skipped
    when candidateEvents exist
  - eventCount >= 3 for protocols with clear procedural steps in PDF text
