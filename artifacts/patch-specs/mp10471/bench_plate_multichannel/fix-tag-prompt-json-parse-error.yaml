title: Fix tag_prompt JSON parsing to handle truncated or malformed LLM responses
rationale: The tag_prompt pass failed with 'Unterminated string in JSON at
  position 705', indicating the LLM response was truncated or malformed. This
  prevents proper entity tagging (materials, labware, etc.) which feeds into the
  ai_precompile pass. The fix should add robust JSON parsing with fallback
  recovery (e.g., attempting to parse partial JSON, or using a more lenient
  parser) and ensure the prompt contract enforces complete JSON output.
