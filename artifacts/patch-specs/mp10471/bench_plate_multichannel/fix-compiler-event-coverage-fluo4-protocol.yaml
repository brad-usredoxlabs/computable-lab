title: Add verb lowering for Fluo-4 Direct calcium assay protocol steps
rationale: "The PDF describes a multi-step protocol including: 1) Cell
  preparation (adherent/non-adherent), 2) Probenecid preparation (dissolving
  Component B in Component C buffer), 3) Fluo-4 Direct reagent preparation
  (mixing Component A with buffer), 4) Loading cells with reagent, 5)
  Incubation, 6) Measurement. The compiler only produced 2 mix events, missing
  the critical pipetting, incubation, and measurement steps. The compiler needs
  verb lowering rules for: pipette_transfer (loading reagent to cells), incubate
  (37°C or RT incubation), and measure_fluorescence (reading at 495/516 nm)."
