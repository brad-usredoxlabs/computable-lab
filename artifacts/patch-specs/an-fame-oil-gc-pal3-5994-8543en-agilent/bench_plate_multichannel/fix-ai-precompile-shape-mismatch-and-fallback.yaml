fixClass: precompiler_reference_shape
title: Fix ai_precompile shape mismatch and ensure fallback produces candidateEvents
rationale: The compiler diagnostics show 'ai_precompile_shape_mismatch' and
  'tag_prompt_parse_error' (Unterminated string in JSON). The ai_precompile pass
  failed to produce valid output, and the fallback path produced empty
  candidateEvents, causing all downstream passes (expand_biology_verbs,
  resolve_labware, etc.) to be skipped. The PDF contains clear protocol steps
  (weigh 100mg, add heptane/hexane 5mL, add KOH 200uL, vortex, wait, GC
  analysis) that should have been extracted. The root cause is that the
  ai_precompile pass's JSON parsing is fragile and the fallback doesn't attempt
  deterministic extraction from the presegmented candidates (7+12+2+1=22
  candidates were supplied by Foundry).
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass must handle JSON parse errors gracefully without crashing
    the pipeline
  - When ai_precompile output shape mismatches, the fallback must attempt to use
    presegmented candidates to produce candidateEvents
  - For this protocol, at least 5 candidate events should be produced
    (weigh_sample, add_solvent, add_reagent, vortex, wait, gc_inject)
  - Downstream passes (expand_biology_verbs, resolve_labware) must not be
    skipped when candidateEvents are present
