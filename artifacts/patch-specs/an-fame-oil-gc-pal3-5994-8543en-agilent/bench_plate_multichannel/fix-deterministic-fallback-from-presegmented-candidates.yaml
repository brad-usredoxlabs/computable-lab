fixClass: extractor_prompt_contract
title: Implement deterministic fallback extraction from presegmented candidates
  when ai_precompile fails
rationale: The Foundry presegmented extraction service supplied 22 deterministic
  candidates (7+12+2+1) from the protocol text, but these were never converted
  to candidateEvents because the ai_precompile pass failed and the fallback
  produced empty output. The DeterministicPrecompilePass should be able to
  convert these presegmented candidates into candidateEvents using verb matching
  and parameter parsing, but this path is not being triggered. The fix should
  ensure that when ai_precompile fails, the pipeline falls back to deterministic
  extraction from presegmented candidates.
ownedFiles:
  - server/src/compiler/pipeline/passes/DeterministicPrecompilePass.ts
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - When ai_precompile fails or produces empty candidateEvents,
    DeterministicPrecompilePass should be invoked
  - Presegmented candidates should be matched against known biology verbs
    (weigh, add, vortex, wait, inject)
  - For this protocol, deterministic extraction should produce at least 5 events
    from the 22 presegmented candidates
  - The pipeline should not produce eventCount=0 when presegmented candidates
    are available
