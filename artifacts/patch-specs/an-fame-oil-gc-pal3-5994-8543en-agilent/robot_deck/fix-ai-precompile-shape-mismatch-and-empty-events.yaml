fixClass: precompiler_reference_shape
title: Fix ai_precompile shape mismatch and empty candidateEvents
rationale: The compiler output shows 'ai_precompile_shape_mismatch' warning,
  causing the fallback to produce empty candidateEvents. This results in all
  downstream passes (expand_biology_verbs, resolve_labware, etc.) being skipped,
  leading to eventCount=0. The root cause is in ChatbotCompilePasses.ts where
  the ai_precompile pass fails to parse or validate the LLM output shape
  correctly. Additionally, the tag_prompt has a JSON parse error ('Unterminated
  string in JSON'), suggesting the pre-compiler extraction is producing
  malformed JSON that the ai_precompile pass cannot handle.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass successfully parses LLM output without shape mismatch
    warnings
  - candidateEvents array is populated with at least 3 events from the FAMEs
    protocol steps
  - tag_prompt JSON parsing errors are resolved or gracefully handled
  - Downstream passes (expand_biology_verbs, resolve_labware) are no longer
    skipped due to empty candidateEvents
