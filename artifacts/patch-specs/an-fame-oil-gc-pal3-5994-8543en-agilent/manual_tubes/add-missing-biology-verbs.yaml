  - server/src/compiler/expanders/cap_expander.ts
acceptance:
  - Compiler no longer emits 'unknown_biology_verb' warnings for weigh, place,
    cap, or wait
  - Events for weighing sample, placing in vial, capping, and waiting for phase
    separation appear in event graph
  - Wait events include duration parameter (e.g., 5 minutes for phase separation)
  - Weigh events include mass parameter (e.g., 100 mg)
