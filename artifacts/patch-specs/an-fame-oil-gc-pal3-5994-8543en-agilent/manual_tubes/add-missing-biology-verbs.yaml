title: Register expanders for weigh, place, cap, and wait verbs
rationale: The compiler diagnostics show multiple 'unknown_biology_verb'
  warnings for 'weigh', 'place', 'cap', and 'wait'. These are fundamental sample
  preparation operations described in the PDF (weighing 100mg sample, placing in
  vial, capping, waiting for phase separation). Without registered expanders,
  these candidate events are dropped, leading to incomplete protocol coverage.
  The 'wait' verb is particularly critical for the 5-minute phase separation
  step.
