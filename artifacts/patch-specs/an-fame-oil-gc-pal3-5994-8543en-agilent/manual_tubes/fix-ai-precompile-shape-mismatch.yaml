title: Fix ai_precompile output shape mismatch causing skipped passes
rationale: The compiler reports 'ai_precompile_shape_mismatch' warning, which
  causes downstream passes (mint_materials, apply_directives, resolve_labware,
  expand_patterns) to be skipped because their 'when' conditions evaluate to
  false. This prevents proper material resolution, labware resolution, and
  pattern expansion. The pre-compiler output shape must match the expected
  schema for the compiler to process candidates correctly.
