title: Fix ai_precompile output shape mismatch causing downstream pass skips
rationale: "The compiler diagnostics show 'ai_precompile_shape_mismatch', which
  caused critical downstream passes to be skipped: 'mint_materials' (because
  mintMaterials was false), 'resolve_labware' (because candidateLabwares was
  false), and 'expand_patterns' (because patternEvents was false). This is the
  root cause of the empty materials list, unresolved labware refs, and the
  generic/incorrect event graph. The pre-compiler's AI output shape does not
  match the compiler's expected schema, so the compiler falls back to defaults
  or skips entirely."
