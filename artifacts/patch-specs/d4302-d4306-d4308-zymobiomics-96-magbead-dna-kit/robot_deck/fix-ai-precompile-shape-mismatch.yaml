acceptance:
  - ai_precompile pass outputs a shape that includes non-empty mintMaterials,
    candidateLabwares, and patternEvents arrays when the PDF contains protocol
    steps.
  - No 'ai_precompile_shape_mismatch' warning appears in diagnostics for this
    protocol.
  - Downstream passes (mint_materials, resolve_labware, expand_patterns) are no
    longer skipped by when conditions for this protocol.
