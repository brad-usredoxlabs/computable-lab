  - "candidateEvents includes events for: add lysis solution,
    bead-beat/incubate, add MagBinding Buffer, magnetic separation, wash with
    MagWash 1, wash with MagWash 2, elute DNA"
  - Labware references (96-well plate, magnetic separation rack, reservoirs) are
