title: Ensure presegmented extraction produces actionable candidates from
  ZymoBIOMICS protocol text
rationale: The diagnostics show multiple 'foundry_presegmented_candidates' info
  messages (10, 5, 33, 15, 28, 17, 6, 1 candidates across chunks) but also one
  'foundry_presegmented_no_actionable_candidates' warning. Despite 115 total
  candidates being extracted, the ai_precompile shape mismatch caused all
  candidates to be discarded in the fallback path. Once the shape mismatch is
  fixed, the presegmented candidates should flow through to candidateEvents.
  However, the extraction service may need to ensure that candidates from the
  ZymoBIOMICS protocol (which contains specific steps like bead-beating,
  binding, washing, elution) are properly tagged as protocol-action evidence
  rather than just material references. The ExtractionRunnerService and
  presegmented extraction logic should verify that candidates include
  verb-action pairs (e.g., 'add Lysis Solution', 'incubate', 'magnetic
  separation', 'wash with MagWash 1', 'elute with DNase/RNase Free Water').
