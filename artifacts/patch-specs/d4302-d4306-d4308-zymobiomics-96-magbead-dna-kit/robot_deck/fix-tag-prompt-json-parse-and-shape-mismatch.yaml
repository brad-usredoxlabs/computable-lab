variant: robot_deck
fixClass: precompiler_reference_shape
title: Fix tag_prompt JSON parsing to handle markdown code fences and ensure
  ai_precompile shape compatibility
rationale: "The compiler diagnostics show two critical failures: (1)
  'tag_prompt_parse_error' with raw_preview showing the LLM returned
  markdown-wrapped JSON ('```json\\n{...}'), which the parser rejects as invalid
  JSON starting with 'B' from the preamble text. (2)
  'ai_precompile_shape_mismatch' causing the fallback path that produces zero
  candidateEvents. This cascades into all downstream passes being skipped
  (mint_materials, apply_directives, expand_biology_verbs, resolve_labware,
  etc.), resulting in eventCount=0. The root cause is that the tag_prompt pass
  in ChatbotCompilePasses.ts does not strip markdown code fences before
  JSON.parse, and the ai_precompile pass output shape does not match the
  expected AiPrecompileOutput interface, triggering the fallback that produces
  empty results."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - tag_prompt pass successfully parses LLM responses wrapped in ```json code
    fences by stripping markdown before JSON.parse
  - ai_precompile pass output shape matches AiPrecompileOutput interface without
    triggering shape_mismatch warning
  - candidateEvents array is populated with at least 3 events from the
    ZymoBIOMICS protocol text
  - expand_biology_verbs pass is no longer skipped due to empty candidateEvents
  - resolve_labware pass is no longer skipped due to empty candidateLabwares
  - eventCount >= 3 in compiler output for this protocol
