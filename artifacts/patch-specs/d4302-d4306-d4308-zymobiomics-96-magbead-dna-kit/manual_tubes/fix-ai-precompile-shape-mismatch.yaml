title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: The compiler diagnostics show 'ai_precompile_shape_mismatch', which
  caused critical downstream passes (mint_materials, apply_directives,
  resolve_labware, expand_patterns) to be skipped. This is the root cause of the
  gap outcome. The ai_precompile pass in ChatbotCompilePasses.ts is producing
  output that doesn't match the expected AiPrecompileOutput schema, causing the
  when conditions for subsequent passes to evaluate to false. Without these
  passes, materials aren't minted, labware isn't resolved, and patterns aren't
  expanded.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass produces output matching AiPrecompileOutput schema with
    mintMaterials, directives, candidateLabwares, and patternEvents fields
  - Downstream passes (mint_materials, apply_directives, resolve_labware,
    expand_patterns) are no longer skipped due to false when conditions
  - Compiler outcome changes from 'gap' to 'complete' or 'error' with specific
    error messages instead of generic shape mismatch
