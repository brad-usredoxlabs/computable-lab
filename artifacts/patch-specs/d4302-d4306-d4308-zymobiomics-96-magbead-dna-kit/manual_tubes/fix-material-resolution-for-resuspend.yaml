fixClass: material_catalog_or_spec
title: Resolve 'resuspend' material reference in compiler
rationale: The compiler gaps show 'resuspend' as an unresolved material
  reference with 'registry hit ontology' and 'kind material not handled by
  resolve_references'. This indicates that 'resuspend' is being treated as a
  material when it should be treated as an action/verb. The resolve_references
  function in the compiler needs to be updated to handle this case, either by
  recognizing 'resuspend' as a verb that should trigger a mix/resuspend event
  rather than a material lookup, or by adding it to the material catalog with
  appropriate handling.
