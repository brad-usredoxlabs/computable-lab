title: Add labware resolution for ZymoBIOMICS specific labware types
rationale: "The compiler gaps show unresolved labware references: 'ZR
  BashingBead™ Lysis Tubes (0.1 & 0.5 mm)', 'ZymoBIOMICS™ BashingBead™ Lysis
  Rack (0.1 & 0.5 mm)', 'generic_96_well_plate', and 'elution plate or tube'.
  These are specific to the ZymoBIOMICS protocol but the labware resolver cannot
  find matching definitions. The LabwareDefinitionRegistry.ts needs to either
  have these definitions added or the resolver needs to be updated to handle
  these specific labware types with appropriate aliases."
