  - ZymoBIOMICS™ BashingBead™ Lysis Rack (0.1 & 0.5 mm) resolves to a valid
    labware definition
  - generic_96_well_plate resolves to a valid labware definition
  - elution plate or tube resolves to a valid labware definition
  - No unresolved_ref gaps for labware in compiler output
