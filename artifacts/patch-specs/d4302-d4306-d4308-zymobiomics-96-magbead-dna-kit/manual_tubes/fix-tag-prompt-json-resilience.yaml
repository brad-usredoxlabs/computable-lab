variant: manual_tubes
fixClass: extractor_prompt_contract
title: Make tag_prompt LLM response parsing resilient to unterminated JSON strings
rationale: The tag_prompt pass receives LLM output with unterminated JSON
  strings (e.g., trailing quotes or missing closing braces). The current parser
  fails hard on this, producing a warning and likely empty/undefined
  taggedPhrases. This cascades to ai_precompile which depends on tagged phrases
  for entity resolution. The fix should add JSON repair logic (e.g., try
  parsing, then attempt to fix common issues like unterminated strings, missing
  commas, trailing content) before passing to downstream passes. This is a
  separate fix from the shape mismatch because it addresses the root cause of
  malformed input rather than just the output shape.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - tag_prompt pass no longer emits 'tag_prompt_parse_error' warning for common
    JSON formatting issues
  - taggedPhrases are extracted even when LLM output has minor JSON formatting
    errors
  - Compiler can proceed to ai_precompile with valid tagged phrases from
    repaired JSON
