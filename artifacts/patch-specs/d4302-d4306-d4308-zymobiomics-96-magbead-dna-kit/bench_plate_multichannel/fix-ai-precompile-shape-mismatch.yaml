title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: "The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
  AI precompile pass produced output that doesn't match the expected schema.
  This caused critical downstream passes to be skipped: 'mint_materials' (no
  mintMaterials), 'resolve_labware' (no candidateLabwares), and
  'expand_patterns' (no patternEvents). Without these passes, materials and
  labware cannot be resolved, leading to unresolved references and a blocked
  event graph. The root cause is likely in ChatbotCompilePasses.ts where
  createAiPrecompilePass generates output that doesn't conform to the
  AiPrecompileOutput type expected by subsequent passes."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass produces output matching AiPrecompileOutput schema with
    mintMaterials, candidateLabwares, and patternEvents fields
  - Downstream passes mint_materials, resolve_labware, and expand_patterns are
    no longer skipped due to false when conditions
  - Compiler diagnostics no longer contain 'ai_precompile_shape_mismatch' warning
