title: Handle 'resuspend' as a valid material reference in resolve_references
rationale: The compiler gaps show two unresolved_ref entries for 'resuspend'
  with reasons 'registry hit ontology' and 'kind material not handled by
  resolve_references'. This indicates that 'resuspend' is being treated as a
  material reference when it should either be handled as a verb/action or
  properly resolved. The resolve_references pass doesn't know how to handle this
  kind of material reference, causing it to fail. This needs to be either added
  to the material registry or handled as a special case in the resolver.
