acceptance:
  - Compiler diagnostics no longer contain 'ai_precompile_shape_mismatch'
    warning.
  - Downstream passes (mint_materials, resolve_labware, etc.) are no longer
    skipped due to false 'when' conditions.
  - The ai_precompile output conforms to the expected schema with proper
    candidateLabwares, mintMaterials, and directives fields.
  - Labware resolution pass executes and resolves labware references correctly.
