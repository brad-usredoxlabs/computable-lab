title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: The compiler reports 'ai_precompile output shape mismatch' warning,
  and multiple downstream passes are skipped because their 'when' conditions
  evaluate to false (mint_materials, apply_directives, resolve_labware,
  resolve_prior_labware_references, expand_patterns). This indicates the
  ai_precompile pass is producing output that doesn't match the expected schema,
  causing the compiler to skip critical resolution steps. This results in
  unresolved labware references and missing material instances.
