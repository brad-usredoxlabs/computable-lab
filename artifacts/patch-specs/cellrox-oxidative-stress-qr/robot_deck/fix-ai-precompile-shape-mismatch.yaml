fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: "The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
  AI precompile pass produced output that doesn't match the expected schema.
  This caused critical downstream passes to be skipped: 'mint_materials',
  'apply_directives', 'resolve_labware', 'resolve_prior_labware_references', and
  'expand_patterns'. Without these passes, materials aren't minted, labware
  isn't resolved, and the event graph lacks proper material references. The fix
  must ensure the ai_precompile pass outputs a correctly shaped object with
  fields like mintMaterials, directives, candidateLabwares, priorLabwareRefs,
  and patternEvents."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass outputs an object matching the AiPrecompileOutput type
    schema
  - mint_materials pass is no longer skipped when materials are present in the
    protocol
  - resolve_labware pass is no longer skipped when labware hints exist
  - No 'ai_precompile_shape_mismatch' warning in diagnostics for this protocol
