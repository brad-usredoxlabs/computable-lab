title: Fix ai_precompile JSON parse error and ensure fallback produces candidateEvents
rationale: "The compiler diagnostics show 'tag_prompt response was not valid
  JSON: Unterminated string in JSON at position 661' followed by 'ai_precompile
  output shape mismatch, using fallback'. The fallback path produced zero
  candidateEvents, causing all downstream passes (expand_biology_verbs,
  resolve_labware, mint_materials) to be skipped. The root cause is that the
  ai_precompile pass's fallback does not produce a valid AiPrecompileOutput with
  candidateEvents when the LLM response is malformed. The PDF has 8 clear
  protocol steps that should be extracted. The fix must make the fallback path
  produce at least a minimal set of candidateEvents from the deterministic
  candidates (12 were supplied by presegmented text), or fix the JSON parsing to
  handle the truncated response."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass no longer emits 'ai_precompile_shape_mismatch' warning
    for this protocol
  - outputs.ai_precompile.candidateEvents is non-empty (at least 4 events from
    the 8 protocol steps)
  - expand_biology_verbs pass is no longer skipped (when condition evaluates to
    true)
  - eventCount >= 3 in the final compiler output
