title: Register expanders for 'treat', 'remove', and 'analyze' biology verbs
rationale: "The compiler diagnostics explicitly warn 'No expander registered for
  verb' for 'treat', 'remove', and 'analyze'. These are core protocol steps from
  the PDF (Step 1: Treat cells, Step 4: Remove medium, Step 8: Analyze cells).
  Without these expanders, the compiler drops these candidate events, resulting
  in incomplete protocol coverage. 'treat' should lower to an add_material or
  incubate event, 'remove' should lower to a transfer/aspirate event, and
  'analyze' should lower to a read/measure event."
