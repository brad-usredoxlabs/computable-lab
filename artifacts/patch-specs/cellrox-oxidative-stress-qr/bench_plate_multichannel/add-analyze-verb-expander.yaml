title: Add biology verb expander for 'analyze' to handle cell analysis steps
rationale: The compiler drops candidate events with verb 'analyze' because no
  expander is registered. The PDF protocol step 8 says 'Analyze the cells' which
  is a terminal measurement/reading operation. Without this expander, the
  analysis step is lost. The BiologyVerbExpander.ts needs a handler for
  'analyze' that lowers to a measurement/read event.
ownedFiles:
  - server/src/compiler/biology/BiologyVerbExpander.ts
acceptance:
  - Verb 'analyze' is registered in the biology verb expander registry
  - Candidate events with verb 'analyze' are expanded to measurement/read events
    instead of being dropped
  - Compiler diagnostics no longer show 'unknown_biology_verb' warning for
    'analyze'
  - Event graph includes analysis/measurement step events
