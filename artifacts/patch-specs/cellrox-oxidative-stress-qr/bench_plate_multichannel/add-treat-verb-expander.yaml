title: Add biology verb expander for 'treat' to handle cell treatment steps
rationale: The compiler drops candidate events with verb 'treat' because no
  expander is registered. The PDF protocol step 1 says 'Treat the cells with the
  test compound or drug' which is a core biology operation. Without this
  expander, the treatment step is lost from the event graph. The
  BiologyVerbExpander.ts needs a handler for 'treat' that lowers to appropriate
  liquid handling events (e.g., add_reagent with compound material).
