title: Wire generic labware aliases to existing labware definitions
rationale: The compiler reports unresolved refs for 'generic_96_well_plate' and
  'generic_12_well_reservoir' with reason 'no matching labware in prior
  snapshot'. However, the execution scale plan shows these labware kinds exist
  (lbw-def-generic-96-well-plate, lbw-def-generic-reservoir-1-v1). The issue is
  that the resolve_labware pass was skipped due to the ai_precompile shape
  mismatch, so labware resolution never occurred. Once the ai_precompile shape
  is fixed, the resolver should be able to map these generic aliases to existing
  definitions. If the resolver still fails, the LabwareDefinitionRegistry.ts may
  need alias mappings for 'generic_96_well_plate' ->
  'lbw-def-generic-96-well-plate' and 'generic_12_well_reservoir' ->
  'lbw-def-generic-reservoir-1-v1'.
