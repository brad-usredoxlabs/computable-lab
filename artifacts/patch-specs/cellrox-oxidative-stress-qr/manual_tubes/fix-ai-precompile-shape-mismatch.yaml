protocolId: cellrox-oxidative-stress-qr
variant: manual_tubes
fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch to enable labware/material
  resolution passes
rationale: The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
  ai_precompile pass output does not match the expected schema. This causes
  downstream passes (resolve_labware, resolve_prior_labware_references,
  mint_materials, apply_directives, expand_patterns) to be skipped because their
  'when' conditions evaluate to false (e.g.,
  'outputs.ai_precompile.candidateLabwares' is false/missing). The pre-compiler
  segments show no candidates, entities, or labware hints were extracted,
  meaning the ai_precompile pass either produced an empty or malformed output.
  This is the root cause of missing labware resolution and material context.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass output matches the expected AiPrecompileOutput schema
    with candidateLabwares, mintMaterials, directives, priorLabwareRefs, and
    patternEvents fields
  - resolve_labware pass is no longer skipped for protocols with labware
    references in PDF text
  - mint_materials pass is no longer skipped when materials are detected in
    protocol text
  - No 'ai_precompile_shape_mismatch' warning in diagnostics for this protocol
