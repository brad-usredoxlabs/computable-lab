rationale: The diagnostics show 29+ 'foundry_presegmented_candidates' info
  messages, meaning the pre-compiler successfully extracted candidates. However,
  the event graph is empty, indicating these candidates are not being consumed
  by any lowering pass. The candidates likely have a shape that the compiler's
  lowering passes don't recognize (e.g., missing 'verb' field, wrong
  'candidateType', or not being merged into the main candidate list). The
  ChatbotCompilePasses.ts createAiPrecompilePass or the deterministic precompile
  pass needs to ensure candidates are shaped correctly (with verb='dispense' or
  candidateType='plate-map') so the lowering pass can process them.
