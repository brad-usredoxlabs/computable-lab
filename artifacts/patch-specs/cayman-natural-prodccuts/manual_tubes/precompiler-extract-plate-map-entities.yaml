title: Enhance pre-compiler to extract structured plate-map entities from
  inventory tables
rationale: "The pre-compiler segments show 'deterministic candidates' were
  extracted, but the material context is empty (materials: [], materialSpecs:
  [], vendorProducts: []). The pre-compiler needs to recognize the tabular
  format (Plate/Well/Contents/Item Number) and extract each row as a structured
  entity with well position, compound name, and catalog item number. These
  entities should be passed to the compiler as plate-map candidates rather than
  generic text candidates."
ownedFiles:
  - server/src/precompiler/extractors/plate-map-extractor.ts
  - server/src/precompiler/extractors/index.ts
  - server/src/precompiler/schema/plate-map-schema.ts
acceptance:
  - Pre-compiler extracts at least 72 compound entities from the plate map (one
    per non-empty well)
  - Each entity includes well position (e.g., 'A2'), compound name (e.g.,
    'Ursolic Acid'), and item number (e.g., '10072')
  - Material context includes populated materials and vendorProducts arrays
  - Compiler receives structured plate-map candidates instead of generic text
    candidates
