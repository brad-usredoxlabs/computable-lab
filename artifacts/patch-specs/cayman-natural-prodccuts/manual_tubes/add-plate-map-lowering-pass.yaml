title: Add plate-map lowering pass to convert well-content tables into dispense events
rationale: The PDF contains a structured 96-well plate map
  (Plate/Well/Contents/Item Number) with ~40+ compounds. The pre-compiler
  extracted 29+ candidate groups, but the compiler produced 0 events because
  there is no lowering pass that recognizes 'plate-map' or 'well-content-table'
  candidates and converts them into dispense/transfer events. The prior patch
  touched ChatbotCompilePasses.ts but the event graph is still empty, meaning
  the lowering logic was either not added, not wired, or produced no events. The
  compiler needs a deterministic pass that iterates over well-content candidates
  and emits dispense events for each compound-to-well mapping.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - eventCount >= 20 for this protocol (one dispense event per non-Unused well)
  - Each event references a compound name from the PDF (e.g., Ursolic Acid,
    Paclitaxel)
  - Each event references a well position (e.g., A2, A3, B2)
  - Events are of type 'dispense' or 'transfer' with source=compound and
    target=well
  - Compiler outcome changes from 'gap' to 'complete'
