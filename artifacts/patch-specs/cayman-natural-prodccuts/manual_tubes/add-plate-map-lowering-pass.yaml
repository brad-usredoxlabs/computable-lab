fixClass: compiler_event_coverage
title: Add compiler lowering for plate-map/inventory PDFs to produce
  material-placement events
rationale: "The compiler currently treats this PDF as a 'library inventory list'
  and produces zero events because it expects procedural steps (reconstitute,
  dilute, transfer). However, a 96-well plate map IS a valid protocol: it
  defines the material layout of a screening library plate. The compiler needs a
  new lowering path that converts plate-map candidates (well-position +
  compound-name + catalog-number) into material-placement or plate-population
  events. This would produce events like 'populate well A2 with Ursolic Acid
  (10072)' for each mapped well, giving a non-empty event graph that can be
  executed as a plate preparation protocol."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
  - server/src/compiler/biology/BiologyVerbExpander.ts
acceptance:
  - Compiler produces >= 20 events for a plate-map PDF with 20+ mapped wells
  - Each event references a specific well position (e.g., A2, B3) and compound
    name
  - Event graph status changes from 'blocked' to 'draft' with populated events
    array
  - Gap message about 'library inventory list' no longer appears for plate-map
    protocols
