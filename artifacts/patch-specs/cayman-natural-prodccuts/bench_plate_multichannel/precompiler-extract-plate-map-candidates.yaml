title: Pre-compiler must extract plate-map candidates from Cayman 96-well library PDF
rationale: "The pre-compiler segments contain no candidateEvents, entities, or
  labwareHints. The PDF clearly contains a structured plate map (Plate 1, wells
  A1-H12 with compound names and item numbers). The pre-compiler's
  extract_entities pass is producing zero usable candidates for the compiler to
  lower into events. This is a pre-compiler extraction failure: the prompt or
  regex patterns do not recognize the Cayman Chemical plate-map table format."
ownedFiles:
  - server/src/precompiler/extractors/plate-map-extractor.ts
  - server/src/precompiler/prompts/extract-entities.ts
acceptance:
  - Pre-compiler output for cayman-natural-prodccuts must contain at least 1
    candidateEvent with kind 'plate_map' or 'load_plate' containing
    well-to-compound mappings.
  - Pre-compiler must extract at least 20 compound entities with name and
    item_number from the plate map table.
  - Pre-compiler must emit a labwareHint for a 96-well plate (e.g.,
    '96_well_plate' or 'plate_96').
  - Compiler eventCount must be >= 1 after this fix (at minimum a plate-loading
    event).
