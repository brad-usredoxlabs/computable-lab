fixClass: precompiler_reference_shape
title: Ensure presegmented candidates include verb hints for plate-map protocols
rationale: The diagnostics show many 'foundry_presegmented_candidates' messages
  but the candidates lack verb/type hints that the compiler needs to dispatch
  lowering. The pre-compiler segments the text into candidate groups but doesn't
  annotate them with a 'verbHint' or 'contentType' field (e.g., 'plate_map',
  'library_layout'). Without this, the compiler's verb matcher can't find a
  matching verb and produces 0 events. The createAiPrecompilePass or
  deterministic precompile pass needs to annotate candidates with contentType
  when plate-map patterns are detected.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
  - server/src/compiler/pipeline/passes/DeterministicPrecompilePass.ts
acceptance:
  - Pre-compiler output includes 'contentType' or 'verbHint' on candidates for
    plate-map protocols
  - Candidates from plate-map PDFs are annotated with 'plate_map' or equivalent
    type
  - Compiler can dispatch to the correct verb lowering path based on candidate
    annotations
