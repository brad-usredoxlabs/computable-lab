kind: protocol-foundry-patch-spec
id: cayman-natural-prodccuts/bench_plate_multichannel/fix-precompiler-plate-map-candidate-shape
protocolId: cayman-natural-prodccuts
variant: bench_plate_multichannel
fixClass: precompiler_reference_shape
title: Ensure pre-compiler emits structured plate-map candidates with well
  positions and compound names
rationale: "The diagnostics show 'foundry_presegmented_candidates' messages but
  the candidates are not being converted to events. The pre-compiler likely
  extracts raw text segments without structuring them into the shape the
  compiler expects (e.g., {well: 'A2', compound: 'Ursolic Acid', catalogNumber:
  '10072'}). The compiler's extract_entities pass sees candidates but cannot
  match them to any known verb because the candidate shape doesn't include the
  semantic fields needed for plate-map lowering. The pre-compiler
  (DeterministicPrecompilePass.ts or the extraction service) needs to parse the
  tabular plate map format and emit structured candidates with well positions,
  compound names, and catalog numbers."
ownedFiles:
  - server/src/compiler/pipeline/passes/DeterministicPrecompilePass.ts
  - server/src/extract/ExtractionRunnerService.ts
acceptance:
  - "Pre-compiler output includes candidates with fields: well (e.g., 'A2'),
    compound (e.g., 'Ursolic Acid'), catalogNumber (e.g., '10072')"
  - Candidates are not just raw text segments but structured objects the
    compiler can match to plate-map verbs
  - Compiler diagnostics no longer show 'foundry_presegmented_candidates' as the
    only signal without subsequent event generation
  - At least 20 structured candidates are emitted for the Cayman plate map
    (matching the visible wells in the PDF)
