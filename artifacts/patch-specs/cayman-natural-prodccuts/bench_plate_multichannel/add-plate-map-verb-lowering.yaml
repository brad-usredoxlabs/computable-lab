title: Add plate-map verb lowering for 96-well screening library protocols
rationale: The PDF is a Cayman Chemical Natural Products Screening Library plate
  map (96-well). The pre-compiler extracted 23+ candidate segments
  (deterministic candidates from presegmented text), but the compiler produced 0
  events. The compiler lacks a verb/action mapping for 'plate_map' or
  'screening_library' content types. The prior patch touched
  BiologyVerbExpander.ts but the event graph is still empty, meaning the verb
  lowering path was not triggered or the candidates were not shaped correctly
  for the compiler to consume. The compiler needs a dedicated lowering pass that
  recognizes plate-map-style candidates (well-position + compound-name +
  catalog-number) and emits 'load_plate' or 'map_compounds' events.
