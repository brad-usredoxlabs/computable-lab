title: Add 'plate_map' verb lowering for 96-well library plate maps
rationale: The PDF is a 96-well plate map (Cayman Natural Products Screening
  Library). The pre-compiler extracted 22+ candidate groups, but the compiler
  produced 0 events because it has no verb lowering path for 'plate_map' or
  'library_plate' content types. The compiler needs a verb expander that
  recognizes plate-map-style text (well-position + compound-name +
  catalog-number tables) and lowers them to 'load_plate' or 'set_well_contents'
  events.
