protocolId: cayman-natural-prodccuts
variant: bench_plate_multichannel
fixClass: compiler_event_coverage
title: Compiler must lower plate-map candidates to load_plate events
rationale: Even if the pre-compiler produces plate-map candidates, the compiler
  currently produces 0 events. The compiler lacks a lowering rule for plate-map
  / load_plate candidate types. For a screening library protocol, the primary
  event is loading compounds into a 96-well plate. The compiler needs a verb
  handler that transforms a plate-map candidate (well -> compound mapping) into
  a load_plate event with well assignments.
ownedFiles:
  - server/src/compiler/lowering/plate-map-lowering.ts
  - server/src/compiler/verbs/load-plate.ts
  - server/src/compiler/event-graph-builder.ts
acceptance:
  - Compiler must produce at least 1 event of kind 'load_plate' or
    'assign_wells' when given a plate-map candidate.
  - The event graph must contain well-to-compound assignments matching the PDF
    plate map (e.g., A2 -> Ursolic Acid, A3 -> (+)-Abscisic Acid).
  - eventCount must be >= 1 (ideally >= 2 including a plate initialization
    event).
  - outcome must not be 'gap' after this fix.
