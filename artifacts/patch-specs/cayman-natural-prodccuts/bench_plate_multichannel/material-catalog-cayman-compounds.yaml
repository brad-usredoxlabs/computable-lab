fixClass: material_catalog_or_spec
title: Material context must resolve Cayman compound names to material records
rationale: "The material context is empty (materials: [], materialSpecs: [],
  vendorProducts: []). The PDF lists 40+ compounds with Cayman item numbers
  (e.g., Ursolic Acid 10072, Paclitaxel 10461). Without material records, the
  compiler cannot resolve compound references, and the execution scale cannot
  bind reagents. The material extractor must parse the plate map table and
  create vendor-product and material-spec records for each compound."
ownedFiles:
  - server/src/precompiler/materials/cayman-material-extractor.ts
  - server/src/materials/vendor-product-resolver.ts
acceptance:
  - Material context must contain at least 20 material records corresponding to
    compounds in the plate map.
  - Each material record must include name, vendor (Cayman Chemical), and
    item_number.
  - Compiler must be able to resolve compound names in plate-map candidates to
    material IDs.
  - Execution scale reagentLayout must reference resolved material roles instead
    of provisional placeholders.
