fixClass: compiler_event_coverage
title: Add verb expansion for plate map content items
rationale: The PDF text contains a plate map with compounds (e.g., 'Ursolic
  Acid', 'Paclitaxel') in specific wells. The current `PROTOCOL_ACTION_ALIASES`
  in `ProtocolFoundryCompileRunner.ts` only matches action verbs like 'add',
  'mix', etc. It does not recognize 'plate map' or 'well content' as a protocol
  step. The `BiologyVerbExpander` needs a new verb or pattern to handle
  'load_plate' or 'add_compound_to_well' from plate map data. Alternatively, the
  presegmented extractor should generate candidates for each well content as an
  'add_compound' action. Since the presegmented extractor is deterministic and
  simple, it's better to enhance it to recognize plate map lines and generate
  'add_compound' candidates.
ownedFiles:
  - server/src/foundry/ProtocolFoundryCompileRunner.ts
  - server/src/compiler/biology/BiologyVerbExpander.ts
acceptance:
  - Presegmented extractor generates candidates for plate map entries.
  - Compiler produces 'add_compound' or 'load_plate' events for each well
    content.
  - Event graph includes labware references for the source plate and destination
    wells.
