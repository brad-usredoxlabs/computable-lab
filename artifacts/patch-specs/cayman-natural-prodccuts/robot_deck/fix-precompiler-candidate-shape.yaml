fixClass: precompiler_reference_shape
title: Pre-compiler must emit structured candidate objects instead of raw text
rationale: "The pre-compiler segments contain only raw PDF text in the
  'protocol_text' field. The compiler diagnostics show
  'foundry_presegmented_candidates' messages but the compiler produced 0 events.
  This indicates the compiler expects structured candidate objects (with verbs,
  entities, volumes) but receives only raw text. The pre-compiler needs to parse
  the well plate layout table and emit structured candidates like {verb:
  'dispense', entity: 'Ursolic Acid', well: 'A2', source: 'plate_1'}."
ownedFiles:
  - server/src/precompiler/extract-candidates.ts
  - server/src/precompiler/plate-layout-parser.ts
acceptance:
  - Pre-compiler output includes 'candidates' array with structured objects
    containing verb, entity, well, and source fields
  - Each well in the PDF plate layout (A2-C12) generates a candidate with
    correct compound name and item number
  - Compiler receives structured candidates and produces at least 20 events for
    this protocol
