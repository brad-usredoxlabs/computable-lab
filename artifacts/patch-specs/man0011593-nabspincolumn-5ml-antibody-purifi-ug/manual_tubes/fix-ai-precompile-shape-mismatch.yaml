fixClass: precompiler_reference_shape
title: Fix ai_precompile shape mismatch to allow downstream passes to run
rationale: The compiler diagnostics show 'ai_precompile_shape_mismatch' warning.
  This causes the ai_precompile output to be malformed or empty, which triggers
  the 'when' conditions for downstream passes (mint_materials, resolve_labware,
  expand_patterns) to evaluate to false, causing them to be skipped. As a
  result, only 1 event is produced (a default centrifuge event) instead of the
  full protocol steps. The salvageAiPrecompileOutput function in
  ChatbotCompilePasses.ts needs to be more robust in handling malformed LLM
  output, or the LLM prompt/schema needs to be fixed to ensure correct output
  shape.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass no longer emits 'ai_precompile_shape_mismatch' diagnostic
  - mint_materials, resolve_labware, and expand_patterns passes are no longer
    skipped due to false 'when' conditions
  - eventCount >= 3 for protocols with clear procedural steps
