title: Fix ai_precompile output shape mismatch causing downstream pass skips
rationale: The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
  AI pre-compiler output does not match the expected schema. This causes
  critical downstream passes (mint_materials, resolve_labware, expand_patterns)
  to be skipped because their 'when' conditions evaluate to false (e.g.,
  'outputs.ai_precompile.mintMaterials' is false/missing). The PDF contains
  clear protocol steps (centrifugation, binding, elution) and materials (Binding
  Buffer, Elution Buffer, Neutralization Buffer), but only 1 event was produced.
  The root cause is the ai_precompile pass in ChatbotCompilePasses.ts producing
  malformed or incomplete output, preventing the compiler from extracting
  candidates, materials, and labware references.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass output matches expected AiPrecompileOutput schema with
    candidateEvents, mintMaterials, candidateLabwares, and patternEvents fields
    populated when PDF text contains protocol steps
  - Downstream passes (mint_materials, resolve_labware, expand_patterns) are no
    longer skipped due to false 'when' conditions when PDF has actionable
    content
  - eventCount >= 3 for protocols with clear multi-step procedures like antibody
    purification
  - No 'ai_precompile_shape_mismatch' warning in diagnostics for this protocol
