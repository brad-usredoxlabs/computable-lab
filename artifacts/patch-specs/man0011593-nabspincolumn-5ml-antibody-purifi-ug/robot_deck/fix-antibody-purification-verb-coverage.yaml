title: Add verb lowering for antibody purification protocol steps
rationale: The PDF describes a multi-step antibody purification protocol
  (equilibration, sample loading, washing, elution, neutralization, column
  storage) but only 1 centrifuge event was generated. The compiler lacks verb
  expanders for key biology operations like 'bind', 'wash', 'elute',
  'neutralize', and 'store' in the context of spin column purification.
  BiologyVerbExpander.ts needs to recognize these operations and lower them to
  appropriate pipette/centrifuge events.
ownedFiles:
  - server/src/compiler/biology/BiologyVerbExpander.ts
  - server/src/compiler/biology/BiologyVerbExpander.test.ts
acceptance:
  - BiologyVerbExpander recognizes 'bind', 'wash', 'elute', 'neutralize' as
    valid biology verbs for spin column protocols
  - Each verb lowers to appropriate pipette transfer and centrifuge events with
    correct volumes and labware references
  - Test coverage includes spin column antibody purification workflow with at
    least 8 events
