title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: The compiler diagnostics show 'ai_precompile_shape_mismatch', which
  caused all downstream passes (mint_materials, resolve_labware,
  resolve_prior_labware_references, expand_patterns) to be skipped. This is the
  root cause of the low event count (1 event instead of the expected 10+ for an
  antibody purification protocol). The ai_precompile pass in
  ChatbotCompilePasses.ts is producing output that doesn't match the expected
  AiPrecompileOutput schema, causing the when conditions for subsequent passes
  to evaluate to false.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass produces output matching AiPrecompileOutput schema with
    candidateLabwares, mintMaterials, and patternEvents fields
  - Downstream passes (mint_materials, resolve_labware, expand_patterns) are no
    longer skipped due to false when conditions
  - No 'ai_precompile_shape_mismatch' warning in diagnostics for protocols with
    extractable content
