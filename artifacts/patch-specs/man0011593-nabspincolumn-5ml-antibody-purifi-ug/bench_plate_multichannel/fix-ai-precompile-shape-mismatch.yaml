fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: The compiler diagnostics show 'ai_precompile output shape mismatch',
  which causes all downstream passes (mint_materials, resolve_labware,
  expand_patterns) to be skipped because their when conditions evaluate to
  false. This is the root cause of eventCount=1. The ai_precompile pass in
  ChatbotCompilePasses.ts is producing output that doesn't match the expected
  AiPrecompileOutput schema, so candidateLabwares, patternEvents, and
  mintMaterials are all falsy/missing. The pre-compiler extracted 12+ candidates
  but the compiler couldn't use them due to this shape error.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass no longer emits 'ai_precompile_shape_mismatch' warning
  - outputs.ai_precompile.candidateLabwares is a non-empty array when labware
    hints exist in segments
  - outputs.ai_precompile.patternEvents is populated when candidate events are
    present
  - Downstream passes (resolve_labware, expand_patterns) are no longer skipped
    by when conditions
  - eventCount increases from 1 to at least 5 for this protocol
