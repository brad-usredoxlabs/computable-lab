title: Fix ai_precompile output shape mismatch causing downstream pass skips
rationale: The compiler diagnostics show 'ai_precompile output shape mismatch'
  (ai_precompile_shape_mismatch). This caused all downstream passes
  (mint_materials, apply_directives, resolve_labware, expand_patterns) to be
  skipped because their 'when' conditions evaluated to false. The pre-compiler
  extracted 8+18 candidates but the ai_precompile pass failed to produce a valid
  output shape, resulting in only 1 generic 'mix' event instead of the full PCR
  protocol (pool preparation, plate setup, thermal cycling). The root cause is
  that the ai_precompile LLM output did not conform to the expected schema,
  causing the compiler to discard all extracted candidates.
