contextHints:
  - This lane is for the Foundry harness around the compiler, not for adding new
    biology data records.
  - A likely failure pattern is a Foundry runner passing an always-empty lookup
    function where the main app uses a real RecordStore-backed lookup.
  - Patch dependency wiring before adding YAML. Existing records should be found
    before new records are minted.
  - Keep changes local to Foundry runtime wiring unless the regression proves a
    shared compiler API needs a small extension.
doNotTouch:
  - Do not rewrite the pipeline end to end.
  - Do not create real material-instance, aliquot, or physical inventory records
    from vendor PDF evidence.
  - Do not add JSON records data; computable-lab data records must be YAML.
