title: Wire Foundry compile dependencies to the real compiler runtime
rationale: Foundry-specific runs are producing compiler gaps that look like
  missing resolver dependencies or skipped runtime wiring rather than missing
  protocol records. The architect may patch Foundry harness wiring, dependency
  injection, and focused Foundry regressions.
