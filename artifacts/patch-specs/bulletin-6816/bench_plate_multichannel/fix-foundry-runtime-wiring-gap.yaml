acceptance:
  - Foundry compile runs use the same real lookup/resolver dependencies as the
    main app when local seed records exist.
  - Does not hard-code one protocol ID or one vendor PDF.
  - Adds a focused regression proving a Foundry compile dependency is no longer
    stubbed or empty when seed data can satisfy it.
  - Compiler diagnostics for the source protocol lose at least one
    resolver/wiring gap, or the remaining gap is classified more specifically.
