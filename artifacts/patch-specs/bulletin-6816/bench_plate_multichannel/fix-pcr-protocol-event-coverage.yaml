title: Add PCR-specific verb lowering for multiplex qPCR protocol steps
rationale: "The PDF describes a clear multiplex RT-qPCR protocol with steps: 1)
  Prepare multiplex assay pool, 2) Dispense reagents to plate, 3) Seal plate, 4)
  Thermocycle (95°C 2min, 40 cycles of 95°C 10s/60°C 45s), 5) Analyze with CFX
  Maestro. The compiler only produced 1 'mix' event, missing the critical
  pipetting, sealing, and thermocycling events. The compiler needs verb lowering
  rules for PCR-specific operations like 'prepare_pool', 'dispense_reagents',
  'seal_plate', and 'thermocycle'."
