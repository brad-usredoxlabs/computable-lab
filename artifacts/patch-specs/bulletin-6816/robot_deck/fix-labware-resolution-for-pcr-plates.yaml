title: Resolve generic_96_well_plate to Hard-Shell Thin-Wall PCR plate definition
rationale: "The compiler gap reports 'generic_96_well_plate (no matching labware
  in prior snapshot)'. The PDF explicitly specifies 'Hard-Shell Thin-Wall 96- or
  384-Well Skirted PCR Plates, catalog #HSP9655 or HSP3805'. The labware
  resolver needs to map the generic hint to the specific Bio-Rad PCR plate
  definition. Additionally, the Microseal 'B' Adhesive Seal (catalog #MSB1001)
  should be resolved as a consumable. The resolver should check the labware
  catalog for Bio-Rad-specific PCR plate definitions and create an alias from
  'generic_96_well_plate' to the correct definition."
