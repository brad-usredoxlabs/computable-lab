rationale: "The PDF describes a clear multiplex RT-qPCR protocol with steps: 1.1
  prepare assay pool, 1.4 seal/vortex/centrifuge, 1.5 thermal cycling (95°C
  2min, 40 cycles of 95°C 10s/60°C 45s), 1.6 analyze data. The compiler only
  produced one 'mix' event. The compiler lacks verb lowering for PCR-specific
  operations: 'prepare_pool' (mixing reagents per Table 1), 'seal_plate',
  'thermal_cycle', and 'analyze_qpcr'. These must be added to the compiler's
  verb registry so that extracted candidates from the PDF text can be lowered to
  concrete events."
