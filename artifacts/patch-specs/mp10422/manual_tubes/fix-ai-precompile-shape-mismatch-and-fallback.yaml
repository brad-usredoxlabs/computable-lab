fixClass: precompiler_reference_shape
title: Fix ai_precompile shape mismatch and ensure candidateEvents are populated
  from presegmented candidates
rationale: The compiler diagnostics show 'ai_precompile output shape mismatch,
  using fallback' and subsequently all downstream passes (expand_biology_verbs,
  resolve_labware, mint_materials) are skipped because
  outputs.ai_precompile.candidateEvents evaluated to false. The pre-compiler
  supplied 26 total deterministic candidates across chunks (8+4+3+6+4+1), but
  the ai_precompile pass failed to shape them correctly, causing the fallback to
  produce an empty candidateEvents array. This results in eventCount=0 despite
  clear protocol content. The prior patch touched ChatbotCompilePasses.ts but
  the issue persists, indicating the shape validation or fallback logic still
  doesn't properly recover candidates from presegmented text.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass must not emit 'ai_precompile_shape_mismatch' warning when
    presegmented candidates are present
  - outputs.ai_precompile.candidateEvents must be a non-empty array when
    presegmented candidates exist
  - Downstream passes (expand_biology_verbs, resolve_labware) must not be
    skipped when candidateEvents are populated
  - eventCount must be >= 3 for protocols with clear procedural steps
