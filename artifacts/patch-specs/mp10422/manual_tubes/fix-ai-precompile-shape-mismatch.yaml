protocolId: mp10422
variant: manual_tubes
fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: "The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
  AI precompile pass produced output that doesn't match the expected schema.
  This caused critical downstream passes to be skipped: mint_materials,
  apply_directives, resolve_labware, resolve_prior_labware_references, and
  expand_patterns. Without these passes, materials like CellROX reagents are not
  minted, labware is not resolved, and the event graph contains generic
  placeholders (stain_agent, fix_agent) instead of specific reagents. The root
  cause is in ChatbotCompilePasses.ts where createAiPrecompilePass validates or
  transforms the LLM output."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile_shape_mismatch warning no longer appears in diagnostics for
    mp10422
  - mint_materials pass is no longer skipped
    (outputs.ai_precompile.mintMaterials evaluates to true)
  - resolve_labware pass is no longer skipped
    (outputs.ai_precompile.candidateLabwares evaluates to true)
  - Event graph events reference specific materials (e.g.,
    CellROX_Green_Reagent) instead of generic placeholders (stain_agent)
