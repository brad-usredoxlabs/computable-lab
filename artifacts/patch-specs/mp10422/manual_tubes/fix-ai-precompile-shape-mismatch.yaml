title: Fix ai_precompile shape mismatch causing skipped resolution passes
rationale: "The compiler diagnostics show 'ai_precompile_shape_mismatch'
  warning, which caused critical passes to be skipped: 'mint_materials',
  'apply_directives', 'resolve_labware', 'resolve_prior_labware_references', and
  'expand_patterns'. This means the pre-compiler's AI output did not conform to
  the expected schema, so the compiler fell back to generic event generation
  without resolving concrete materials, labware, or directives. The resulting
  event graph uses placeholder materials ('stain_agent', 'fix_agent') instead of
  the specific CellROX reagents from the PDF."
ownedFiles:
  - server/src/protocol-foundry/passes/ai_precompile.ts
  - server/src/protocol-foundry/passes/resolve_labware.ts
  - server/src/protocol-foundry/passes/mint_materials.ts
acceptance:
  - ai_precompile_shape_mismatch warning no longer appears in diagnostics for
    mp10422
  - resolve_labware pass is no longer skipped (no 'pass_skipped_by_when' for
    resolve_labware)
  - mint_materials pass is no longer skipped
  - Event graph events reference concrete material IDs (e.g.,
    'CellROX_Deep_Red_C10422') instead of generic placeholders
