title: Fix tag_prompt JSON parse error from unterminated string
rationale: "The diagnostics show 'tag_prompt response was not valid JSON:
  Unterminated string in JSON at position 741' with a raw_preview showing the
  JSON was cut off mid-string ('CellRO'). This indicates the LLM response for
  tag_prompt is being truncated, likely due to output token limits or improper
  response handling. This parse failure may contribute to the ai_precompile
  shape mismatch if tag_prompt output is consumed by ai_precompile. The fix
  should add robust JSON parsing with truncation recovery or increase the
  response buffer for tag_prompt."
