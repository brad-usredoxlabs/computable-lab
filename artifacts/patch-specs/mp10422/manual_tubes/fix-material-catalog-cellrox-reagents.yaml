fixClass: material_catalog_or_spec
title: Add CellROX reagent material records to enable proper material resolution
rationale: The material context shows empty materials, materialSpecs, and
  vendorProducts arrays. The PDF clearly specifies CellROX Deep Red (C10422),
  Orange (C10443), Green (C10444), and Variety Pack (C10448) reagents with
  specific concentrations (2.5 mM in DMSO), storage conditions, and
  excitation/emission spectra. Without these material records, the compiler
  cannot resolve reagent references and falls back to generic placeholders. The
  mint_materials pass was skipped due to the shape mismatch, but even if it ran,
  the material catalog needs these specific reagent definitions.
ownedFiles:
  - server/src/registry/CompoundClassRegistry.ts
  - server/src/registry/LabwareDefinitionRegistry.ts
acceptance:
  - CellROX Green Reagent (C10444) is resolvable as a material with
    concentration 2.5 mM in DMSO
  - CellROX Orange Reagent (C10443) is resolvable as a material
  - CellROX Deep Red Reagent (C10422) is resolvable as a material
  - Event graph events reference these specific materials instead of generic
    stain_agent/fix_agent placeholders
  - Material specs include storage conditions (≤-20°C, protect from light,
    desiccate)
