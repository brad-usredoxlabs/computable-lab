fixClass: compiler_event_coverage
title: Add lowering from deterministic candidates to candidateEvents in ai_precompile
rationale: The pre-compiler successfully extracted 28 deterministic candidates
  across multiple chunks, but these candidates are not being converted into
  candidateEvents that the compiler can lower to actual events. The
  ai_precompile pass needs to map deterministic candidates (which have action
  verbs, materials, and parameters) into the candidateEvents schema expected by
  expand_biology_verbs. This is a wiring issue between the deterministic
  extraction output and the ai_precompile output shape.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
  - server/src/compiler/pipeline/passes/DeterministicPrecompilePass.ts
acceptance:
  - Deterministic candidates from presegmented text are mapped to
    candidateEvents in ai_precompile output
  - Each candidateEvent includes verb, target labware, source labware, and
    volume parameters
  - expand_biology_verbs receives non-empty candidateEvents and produces
    pipette/incubate events
  - eventCount >= 3 for mp10422 protocol after fix
