fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch to enable material and labware
  resolution passes
rationale: The compiler diagnostics show 'ai_precompile output shape mismatch'
  warning, and subsequent passes (mint_materials, resolve_labware,
  resolve_prior_labware_references, expand_patterns) are all skipped because
  their 'when' conditions evaluate to false. This means the ai_precompile pass
  is producing output that doesn't match the expected AiPrecompileOutput type
  schema, causing the compiler to skip critical resolution steps. The resulting
  event graph uses generic 'stain_agent' and 'fix_agent' materials instead of
  the specific CellROX reagents (C10422, C10443, C10444) mentioned in the PDF.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass output matches AiPrecompileOutput type schema without
    shape mismatch warnings
  - mint_materials pass is no longer skipped when candidate materials are present
  - resolve_labware pass is no longer skipped when candidate labwares are present
  - Compiler diagnostics no longer contain 'ai_precompile_shape_mismatch'
    warnings
