title: Fix ai_precompile shape mismatch causing skipped downstream passes
rationale: "The compiler diagnostics show 'ai_precompile_shape_mismatch'
  warning, which caused critical passes to be skipped: 'mint_materials',
  'resolve_labware', 'resolve_prior_labware_references', and 'expand_patterns'.
  This means the pre-compiler's AI output did not conform to the expected
  schema, so the compiler fell back to generic stubs (stain_agent, fix_agent)
  instead of resolving actual CellROX reagents. The root cause is likely a
  schema drift between the ai_precompile prompt output and the compiler's
  expected input shape."
