title: Add CellROX reagent material records for C10422, C10443, C10444, C10448
rationale: The material context shows empty materials, materialSpecs, and
  vendorProducts arrays. The PDF clearly specifies CellROX Deep Red (C10422),
  Orange (C10443), Green (C10444), and Variety Pack (C10448) reagents with
  specific concentrations (2.5 mM in DMSO), storage conditions (-20°C, protect
  from light), and excitation/emission wavelengths. Without these material
  records, the compiler cannot resolve specific reagent roles, resulting in
  generic 'stain_agent' placeholders in the event graph.
