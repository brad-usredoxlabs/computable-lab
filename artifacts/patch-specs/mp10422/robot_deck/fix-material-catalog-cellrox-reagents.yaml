  - Material records exist for C10422 (Deep Red), C10443 (Orange), C10444
    (Green), and C10448 (Variety Pack)
  - Each material record includes concentration (2.5 mM), solvent (DMSO), and
    storage conditions (≤-20°C, protect from light)
  - Compiler can resolve 'CellROX Deep Red Reagent' text to material ID C10422
  - Event graph events reference concrete material catalog IDs instead of
    generic placeholders
