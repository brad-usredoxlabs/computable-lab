title: Add CellROX reagent material records to material catalog
rationale: The material context shows empty materials, materialSpecs, and
  vendorProducts arrays. The PDF clearly lists four catalog numbers (C10422,
  C10443, C10444, C10448) with specific properties (concentration 2.5 mM in
  DMSO, excitation/emission wavelengths, storage conditions). Without these
  material records, the compiler cannot resolve reagent references and falls
  back to generic 'stain_agent' and 'fix_agent' placeholders. The material
  catalog needs entries for each CellROX reagent variant.
