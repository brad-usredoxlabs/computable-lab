title: Enable labware resolution for CellROX staining protocol
rationale: The resolve_labware pass was skipped due to the ai_precompile shape
  mismatch, but even if it ran, the compiler needs to know that CellROX staining
  protocols typically use 96-well plates for cell samples and reservoirs for
  reagent dispensing. The execution scale plan shows a generic
  'reagent_reservoir' with reason 'prompt mentions reagents but compiled events
  did not identify concrete reagent roles'. The labware resolver needs to be
  wired to recognize staining/incubation workflows and suggest appropriate
  labware (96-well plate for cells, reservoir for reagents).
