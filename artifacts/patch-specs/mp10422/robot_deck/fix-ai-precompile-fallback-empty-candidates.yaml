  - When ai_precompile shape mismatch occurs, the fallback output includes
    candidateEvents derived from deterministic presegmented candidates
  - expand_biology_verbs pass is no longer skipped when deterministic candidates
    exist
  - eventCount >= 3 for protocols with clear protocol steps in the PDF text
  - The ai_precompile fallback preserves candidateLabwares and directives from
    deterministic extraction
