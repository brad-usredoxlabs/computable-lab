title: Ensure ai_precompile fallback populates candidateEvents from
  deterministic candidates
rationale: The diagnostics show 'ai_precompile output shape mismatch, using
  fallback' followed by all downstream passes being skipped because
  'outputs.ai_precompile.candidateEvents evaluated to false'. The fallback path
  in createAiPrecompilePass must extract candidateEvents from the deterministic
  presegmented candidates (10 + 4 + 3 + 6 + 4 + 1 = 28 candidates were found)
  instead of returning an empty object. Without candidateEvents,
  expand_biology_verbs is skipped and no events are generated.
