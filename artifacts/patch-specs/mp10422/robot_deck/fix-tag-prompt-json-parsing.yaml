kind: protocol-foundry-patch-spec
id: mp10422/robot_deck/fix-tag-prompt-json-parsing
protocolId: mp10422
variant: robot_deck
fixClass: precompiler_reference_shape
title: Fix tag_prompt JSON parsing to handle markdown code fences
rationale: "The compiler diagnostic 'tag_prompt response was not valid JSON:
  Unexpected token 'B', \"\\n\\nBased on t\"...' shows that the LLM returned a
  markdown-wrapped JSON response (starting with prose and ```json fences), but
  the parser tried to parse the raw string directly. This caused the tag_prompt
  pass to fail, which cascaded into ai_precompile_shape_mismatch because the
  downstream ai_precompile pass depends on properly tagged entities. The fix
  must strip markdown code fences and prose before JSON.parse in the tag_prompt
  pass."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - tag_prompt pass successfully parses LLM responses that include markdown code
    fences (```json ... ```)
  - tag_prompt pass handles LLM responses with leading prose before the JSON
    block
  - ai_precompile_shape_mismatch warning no longer appears for protocols with
    valid LLM JSON output
  - candidateEvents are populated from the tag_prompt output instead of being
    empty
