kind: protocol-foundry-patch-spec
id: mp10422/bench_plate_multichannel/fix-tag-prompt-json-schema
protocolId: mp10422
variant: bench_plate_multichannel
fixClass: extractor_prompt_contract
title: Enforce strict JSON output from tag_prompt LLM call to prevent parse failures
rationale: "The tag_prompt pass failed because the LLM returned markdown-wrapped
  JSON ('```json\\n{...}') instead of raw JSON. The parser encountered 'Based on
  the provided text...' preamble text before the JSON block. The fix should
  either: (1) add a response format constraint to the LLM prompt requesting raw
  JSON only, (2) add a post-processing step to extract JSON from markdown code
  blocks, or (3) use a JSON schema validation library to parse and extract the
  JSON object from the response. This is a root cause of the ai_precompile shape
  mismatch."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
  - server/src/extract/ExtractionRunnerService.ts
acceptance:
  - tag_prompt responses wrapped in markdown code blocks must be correctly
    parsed.
  - tag_prompt responses with preamble text must have the JSON object extracted.
  - The tag_prompt pass should not produce 'tag_prompt_parse_error' warnings for
    valid JSON responses wrapped in markdown.
  - Integration test with a sample LLM response containing markdown wrapping
    should pass.
