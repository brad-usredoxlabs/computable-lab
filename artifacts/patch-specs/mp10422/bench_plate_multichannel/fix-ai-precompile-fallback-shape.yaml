protocolId: mp10422
variant: bench_plate_multichannel
fixClass: precompiler_reference_shape
title: Fix ai_precompile fallback to produce non-empty candidateEvents when
  tag_prompt fails
rationale: The compiler diagnostics show 'ai_precompile output shape mismatch,
  using fallback' followed by all downstream passes being skipped because
  outputs.ai_precompile.candidateEvents evaluated to false. The tag_prompt pass
  failed with a JSON parse error (Unexpected token 'B'), and the fallback path
  in createAiPrecompilePass produces an empty candidateEvents array. This causes
  eventCount=0. The fix must ensure the fallback path either retries the LLM
  call with a stricter JSON schema or produces a minimal valid candidateEvents
  structure from the presegmented candidates (9+4+3+6+4+1=27 candidates were
  extracted).
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - When tag_prompt returns invalid JSON, the ai_precompile pass must not
    produce an empty candidateEvents array if presegmented candidates exist.
  - The fallback path must map presegmented candidates to candidateEvents with
    at least basic verb/subject/object structure.
  - eventCount must be >= 3 for protocols with clear procedural text.
  - The 'ai_precompile_shape_mismatch' warning should be accompanied by a
    recovery attempt, not silent fallback to empty.
