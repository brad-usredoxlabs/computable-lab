  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass produces output matching AiPrecompileOutput type with
    directives and candidateLabwares fields
  - apply_directives and resolve_labware passes are no longer skipped due to
    missing ai_precompile output
  - No 'ai_precompile_shape_mismatch' warning in diagnostics for mp10422
