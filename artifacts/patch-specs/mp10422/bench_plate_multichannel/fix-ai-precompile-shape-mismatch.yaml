title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
  ai_precompile pass produced output that doesn't match the expected
  AiPrecompileOutput schema. This caused 'apply_directives' and
  'resolve_labware' passes to be skipped (their 'when' conditions evaluated to
  false because outputs.ai_precompile.directives and
  outputs.ai_precompile.candidateLabwares were missing or malformed). Without
  labware resolution, generic labware references remain unresolved, creating
  gaps.
