fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch causing downstream pass skips
rationale: "The compiler diagnostics show 'ai_precompile_shape_mismatch'
  warning, which caused critical downstream passes to be skipped:
  'mint_materials', 'apply_directives', 'resolve_labware', and
  'expand_patterns'. This is the root cause of the gap outcome. The pre-compiler
  extracted 9+43+12 candidates but the ai_precompile pass failed to produce the
  expected output shape (mintMaterials, directives, candidateLabwares,
  patternEvents), so the compiler couldn't lower these candidates into proper
  events. The resulting 5 events are generic stubs (wash-add/wash-remove) that
  don't reflect the actual Mem-PER Plus protocol steps (permeabilization,
  solubilization, centrifugation)."
ownedFiles:
  - server/src/protocol-foundry/passes/ai_precompile.ts
  - server/src/protocol-foundry/passes/ai_precompile.schema.ts
acceptance:
  - ai_precompile pass produces output matching expected schema with
    mintMaterials, directives, candidateLabwares, and patternEvents fields
  - Downstream passes (mint_materials, apply_directives, resolve_labware,
    expand_patterns) are no longer skipped due to shape mismatch
  - Compiler outcome changes from 'gap' to 'complete' or produces meaningful
    error if protocol ambiguity remains
