title: Add protocol variant selection for multi-protocol PDFs
rationale: "The PDF contains 4 distinct protocols (Adherent Cells, Suspension
  Cells, Soft Tissue, Hard Tissue). The compiler produced a gap with
  clarification request: 'Which specific sample type protocol should be
  compiled?'. The compiler needs to either: (1) accept a protocol variant
  parameter to select which sub-protocol to compile, or (2) default to Protocol
  1 (Adherent Mammalian Cells) as the primary protocol with documentation.
  Currently the compiler produces generic wash events instead of the actual
  Mem-PER Plus steps (Cell Wash, Permeabilization Buffer, Solubilization Buffer,
  centrifugation steps)."
