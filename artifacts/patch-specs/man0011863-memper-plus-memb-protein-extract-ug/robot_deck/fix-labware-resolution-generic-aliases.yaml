title: Resolve generic labware aliases (generic_96_well_plate,
  generic_24x1_5ml_tube_rack, generic_12_well_reservoir) in Foundry runtime
rationale: "The compiler output shows multiple 'no matching labware in prior
  snapshot' gaps for generic labware hints like 'generic_96_well_plate',
  'generic_24x1_5ml_tube_rack', and 'generic_12_well_reservoir'. These are
  standard labware types that should be resolvable. The Foundry runtime
  (ProtocolFoundryCompileRunner.ts) creates a labwareLookup from the
  LabwareDefinitionRegistry, but the generic aliases used by the
  LLM/pre-compiler don't match the actual labware definition IDs in the
  registry. The execution scale plan shows it uses
  'lbw-def-generic-96-well-plate' and 'lbw-def-generic-reservoir-1-v1',
  suggesting these definitions exist but the compiler's labware resolution pass
  can't find them because the hint format doesn't match. The fix needs to
  either: (1) add alias mapping in the labware resolver to map
  'generic_96_well_plate' -> 'lbw-def-generic-96-well-plate', or (2) ensure the
  pre-compiler/LLM outputs the correct labware definition IDs."
ownedFiles:
  - server/src/foundry/ProtocolFoundryCompileRunner.ts
  - server/src/registry/LabwareDefinitionRegistry.ts
acceptance:
