id: man0011863-memper-plus-memb-protein-extract-ug/robot_deck/fix-ai-precompile-shape-mismatch-salvage
protocolId: man0011863-memper-plus-memb-protein-extract-ug
variant: robot_deck
fixClass: precompiler_reference_shape
title: Salvage truncated ai_precompile JSON and emit candidateEvents fallback
rationale: "The compiler diagnostics show 'tag_prompt response was not valid
  JSON: Unexpected end of JSON input' followed by 'ai_precompile output shape
  mismatch, using fallback'. The raw_preview shows valid JSON structure that was
  cut off mid-string. This causes candidateEvents to be empty/undefined, which
  triggers 'when' conditions to skip all downstream passes
  (expand_biology_verbs, resolve_labware, etc.), resulting in 0 events. The
  prior patch attempted to fix this but the root cause is that the ai_precompile
  pass in ChatbotCompilePasses.ts does not gracefully handle truncated JSON
  responses from the LLM. We need to: (1) attempt JSON repair by closing
  unclosed brackets/strings, (2) validate the repaired output against the
  expected AiPrecompileOutput shape, and (3) if repair fails, emit a minimal
  valid output with candidateEvents derived from the deterministic candidates
  that were already extracted (11+43+12=66 candidates were found)."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - When ai_precompile receives truncated JSON, the pass attempts repair by
    closing unclosed structures before parsing
  - When repair succeeds, the output is validated against AiPrecompileOutput
    shape and used normally
  - When repair fails or output is still malformed, candidateEvents are
    populated from deterministic candidates found in earlier passes
  - The 'ai_precompile_shape_mismatch' warning is only emitted when both repair
    and fallback fail
  - eventCount >= 3 for protocols with clear procedural steps in PDF text
  - expand_biology_verbs pass is no longer skipped when deterministic candidates
    exist
