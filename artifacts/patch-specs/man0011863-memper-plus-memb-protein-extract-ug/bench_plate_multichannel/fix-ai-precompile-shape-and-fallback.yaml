protocolId: man0011863-memper-plus-memb-protein-extract-ug
variant: bench_plate_multichannel
fixClass: precompiler_reference_shape
title: Fix ai_precompile shape mismatch and ensure candidateEvents are produced
  from presegmented candidates
rationale: The compiler diagnostics show 'ai_precompile_shape_mismatch' and all
  downstream passes (expand_biology_verbs, resolve_labware, mint_materials,
  apply_directives) were skipped because outputs.ai_precompile.candidateEvents
  evaluated to false. The pre-compiler supplied 10+43+12 deterministic
  candidates from presegmented text, but the ai_precompile pass failed to
  produce valid output (shape mismatch), causing the fallback path to produce
  zero candidateEvents. The tag_prompt also had a JSON parse error
  ('Unterminated string in JSON at position 769'), suggesting the LLM response
  was truncated or malformed. The root cause is that createAiPrecompilePass in
  ChatbotCompilePasses.ts either (1) produces output that doesn't match the
  expected AiPrecompileOutput shape, or (2) the fallback when shape mismatches
  produces empty candidateEvents instead of attempting to extract from the
  presegmented candidates. Since presegmented candidates exist (55 total across
  chunks), the compiler should be able to lower these to events even if the
  LLM-based ai_precompile fails.
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass no longer emits 'ai_precompile_shape_mismatch' warning
    for this protocol
  - outputs.ai_precompile.candidateEvents is a non-empty array when presegmented
    candidates exist
  - expand_biology_verbs pass is no longer skipped (when condition evaluates to
    true)
  - eventCount >= 3 for this protocol after the fix
  - tag_prompt JSON parse errors are handled gracefully with retry or fallback
    parsing
