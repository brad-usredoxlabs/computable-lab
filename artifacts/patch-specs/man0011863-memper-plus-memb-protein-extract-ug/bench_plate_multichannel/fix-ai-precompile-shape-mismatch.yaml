fixClass: precompiler_reference_shape
title: Fix ai_precompile output shape mismatch to enable downstream passes
rationale: "The compiler diagnostic 'ai_precompile_shape_mismatch' indicates the
  AI precompile pass produced output that doesn't match the expected
  AiPrecompileOutput schema. This caused three critical downstream passes to be
  skipped: 'mint_materials' (no materials created), 'resolve_labware' (no
  labware resolved), and 'expand_patterns' (no pattern events expanded). The PDF
  contains clear protocol steps (wash, permeabilize, solubilize, centrifuge) but
  only 5 generic events were produced with empty wells arrays. The root cause is
  that the ai_precompile pass output shape is malformed, preventing the compiler
  from extracting candidateLabwares, mintMaterials, and patternEvents needed to
  build a complete event graph."
ownedFiles:
  - server/src/compiler/pipeline/passes/ChatbotCompilePasses.ts
acceptance:
  - ai_precompile pass no longer produces 'ai_precompile_shape_mismatch' warning
    for this protocol
  - outputs.ai_precompile.candidateLabwares is populated with labware candidates
    from PDF text
  - outputs.ai_precompile.mintMaterials is populated with material candidates
    from PDF text
  - outputs.ai_precompile.patternEvents is populated with protocol step patterns
  - Downstream passes mint_materials, resolve_labware, and expand_patterns are
    no longer skipped
  - Event count increases from 5 to at least 15 events covering wash,
    permeabilize, solubilize, and centrifuge steps
