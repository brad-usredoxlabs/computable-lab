$schema: https://json-schema.org/draft/2020-12/schema
$id: computable-lab/context
title: Context
description: |
  The state/context of a subject after event graph replay.
  Generalizes WellContext to any subject type (well, tube, mouse, patient, collection).
  Represents what is "in" or "about" a subject at a given point in time.

type: object
required:
- id
- subject_ref

properties:
  id:
    type: string
    pattern: "^CTX-[A-Za-z0-9_-]+$"
    description: Stable context identifier (e.g., CTX-000001)

  subject_ref:
    $ref: "https://computable-lab.com/schema/computable-lab/datatypes/ref.schema.yaml"
    description: |
      The subject this context describes.
      Can be an individual (well, tube, mouse, patient) or a collection.
      Supports kind: record or kind: collection.

  event_graph_ref:
    $ref: "https://computable-lab.com/schema/computable-lab/datatypes/ref.schema.yaml"
    description: Event graph that produced this context (optional)

  timepoint:
    type: string
    description: |
      ISO datetime or duration offset for when context was computed.
      Examples: "2026-01-30T18:00:00Z", "PT24H", "T+24h"

  # Computed state fields (populated by event graph replay)
  contents:
    type: array
    items:
      type: object
      properties:
        material_ref:
          $ref: "https://computable-lab.com/schema/computable-lab/datatypes/ref.schema.yaml"
          description: Reference to the material (ontology or record)
        volume:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
          required:
          - value
          - unit
        concentration:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
          required:
          - value
          - unit
        mass:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
          required:
          - value
          - unit
        count:
          type: integer
          description: Number of items (e.g., cell count)
    description: Materials/reagents/cells currently in the subject

  total_volume:
    type: object
    properties:
      value:
        type: number
      unit:
        type: string
    required:
    - value
    - unit
    description: Total volume in the subject

  properties:
    type: object
    additionalProperties: true
    description: |
      Additional computed properties.
      Examples: temperature, pH, confluence, viability, etc.

  # Derivation pinning
  derivation_versions:
    type: object
    additionalProperties:
      type: integer
      minimum: 1
    description: "Map of derivation-model id -> version pinned when this context was computed (compiler-specs/30 §10)."

  # Completeness tracking
  completeness:
    type: string
    enum: [complete, partial]
    default: complete
    description: "Whether all inputs to this context's computation were present (compiler-specs/30 §6)."

  missing:
    type: array
    items:
      type: string
    description: "When completeness is 'partial', list the gaps (missing material composition, missing model version, etc.)."

  # Layer provenance
  layer_provenance:
    type: object
    additionalProperties: false
    description: "Which layer produced each field in this context (compiler-specs/30 §4)."
    properties:
      event_derived:
        type: array
        items: { type: string }
      model_derived:
        type: array
        items: { type: string }
      observed:
        type: array
        items: { type: string }

  # Observed fields
  observed:
    type: object
    additionalProperties: true
    description: "Observed fields populated from instruments or expert judgment. Values may be plain scalars or {value, assertion_ref} for judgments (compiler-specs/30 §11, compiler-specs/40 §8)."

  # Legacy WellContext compatibility fields
  plate_ref:
    $ref: "https://computable-lab.com/schema/computable-lab/datatypes/ref.schema.yaml"
    description: "DEPRECATED (use subject_ref): (Legacy) Reference to plate record. Use subject_ref instead."

  well_id:
    type: string
    description: "DEPRECATED (use subject_ref): (Legacy) Well identifier like A1. Use subject_ref instead."

  notes:
    type: string
    description: Free-form notes about this context

  tags:
    type: array
    items:
      type: string
    description: Tags for categorization and search
