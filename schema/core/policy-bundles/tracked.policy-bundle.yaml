kind: policy-bundle
id: POL-TRACKED
label: "Tracked"
level: 2
description: "QMS issues require acknowledgment. Expired authorizations and stale calibrations need confirmation. For labs building toward compliance."
settings:
  allowAutoCreate: confirm
  allowSubstitutions: confirm
  allowPlaceholders: deny
  allowRemediation: confirm
  allowSupervisedUse: confirm
  allowExpiredTraining: confirm
  allowExpiredAuthorization: confirm
  allowOutOfCalibrationEquipment: confirm
  allowUnqualifiedEquipment: confirm
  approvalAuthority: project-owner
