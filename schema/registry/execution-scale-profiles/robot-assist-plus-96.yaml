$schema: https://computable-lab.com/schema/computable-lab/execution-scale-profile.schema.yaml
kind: execution-scale-profile
recordId: execution-scale-profile/robot-assist-plus-96
type: execution_scale_profile
id: robot-assist-plus-96
display_name: INTEGRA ASSIST PLUS 96-Well
sourceLevel: manual_tubes
targetLevel: robot_deck
priority: 120
matching:
  prompt_cues:
    - assist
    - assist plus
    - robot
    - deck
    - single reservoir
    - reagent trough
    - 96-well
  platforms:
    - integra_assist
sampleLayout:
  labwareRole: sample_plate
  labwareKind: 96_well_plate
  labwareDefinition: lbw-def-generic-96-well-plate
  defaultWellOrder: column_major
reagentSource:
  sourceLabwareRole: reagent_reservoir
  sourceLabwareKind: 1_well_reservoir
  labwareDefinition: lbw-def-generic-reservoir-1-v1
  defaultSourceWells:
    - "1"
pipetting:
  pipetteMode: multi_channel_parallel
  channels: 8
  laneStrategy: parallel_lanes
  channelization: multi_channel_prefer
  batching: group_by_source
  maxVolumeUl: 20
  requiredTools:
    - pipette-capability/p20-multi-8
deckBinding:
  platform: integra_assist
  requiredLabwareDefinitions:
    - lbw-def-generic-96-well-plate
    - lbw-def-generic-reservoir-1-v1
  requiredTools:
    - pipette-capability/p20-multi-8
assumptions:
  - ASSIST PLUS lowering uses the same plate and lane semantics as bench multichannel planning, then binds them to deck-compatible labware and tool profiles.
notes: >
  Default ASSIST PLUS reagent source is a single shared reservoir/trough suitable
  for loading 8-channel or 12-channel pipettes. Use a 2-well reservoir only when
  a protocol or run context explicitly requests one.
