attributeVersion: 1
subject_type: stock
attribute: concentration
description: "Prepared concentration of a reagent stock, as kept in the lab."
value_schema:
  type: object
  additionalProperties: false
  required: [value, unit]
  properties:
    value:
      type: number
      minimum: 0
    unit:
      type: string
      enum: [uM, mM, M, ug_per_mL, mg_per_mL, percent_v_v, percent_w_v]
    prepared_iso:
      type: string
      format: date-time
      description: "When this stock was prepared; supports expiration reasoning."
