pipelineId: chatbot-compile
entrypoint: chatbot-compile
description: >
  Compile a chatbot prompt (+ optional file attachments) from the event-graph
  editor into proposed PlateEvent primitives and labware additions. Used by
  AgentOrchestrator to produce a preview bundle that downstream UI can
  render in the side-by-side labware panes.
passes:
  - id: extract_entities
    family: parse
    description: Run ExtractionRunnerService against prompt text and file attachments; emit structured entities (labware hints, material refs, operators, dates, volumes).

  - id: ai_precompile
    family: expand
    depends_on: [extract_entities]
    description: LLM-backed pass that turns prompt + extracted entities into candidate events, candidate labwares, and unresolved refs.

  - id: mint_materials
    family: expand
    depends_on: [ai_precompile]
    description: Expand mintMaterials directives into create_container + add_material events.

  - id: expand_biology_verbs
    family: expand
    depends_on: [ai_precompile]
    description: Expand high-level biology verbs (seed, incubate, harvest, etc.) in candidate events into compositions of primitive event types that ContextEngine already handles.

  - id: resolve_labware
    family: disambiguate
    depends_on: [ai_precompile]
    description: Resolve labware hints to existing labware-instance records via searchLabwareByHint; emit AiLabwareAddition entries for unmatched hints.

  - id: resolve_references
    family: disambiguate
    depends_on: [ai_precompile]
    description: Resolve named references (protocol, assay, pattern, compound-class) against their registries.

  - id: resolve_prior_labware_references
    family: disambiguate
    depends_on: [ai_precompile]
    description: Resolve priorLabwareRefs against the priorLabState snapshot.

  - id: expand_protocol
    family: expand
    depends_on: [resolve_references]
    description: Unroll resolved protocol refs into primitive events using step graph + parameter bindings.

  - id: lab_state
    family: emit
    depends_on: [expand_biology_verbs]
    description: Fold expanded events over prior lab-state snapshot and emit labStateDelta.
