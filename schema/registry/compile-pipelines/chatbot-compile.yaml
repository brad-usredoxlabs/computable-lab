pipelineId: chatbot-compile
entrypoint: chatbot-compile
description: >
  Compile a chatbot prompt (+ optional file attachments) from the event-graph
  editor into proposed PlateEvent primitives and labware additions. Used by
  AgentOrchestrator to produce a preview bundle that downstream UI can
  render in the side-by-side labware panes.
passes:
  - id: extract_entities
    family: parse
    description: Run ExtractionRunnerService against prompt text and file attachments; emit structured entities (labware hints, material refs, operators, dates, volumes).

  - id: tag_prompt
    family: parse
    depends_on: []
    description: Shadow-mode LLM lexical tagger. Emits text/nthOccurrence tags with server-materialized spans; no compile consumer reads it yet.

  - id: deterministic_precompile
    family: parse
    depends_on: []
    description: Deterministic clause-level precompile using verb-action-map and registries. Produces candidateEvents directly; only residual clauses go to ai_precompile.

  - id: ai_precompile
    family: expand
    depends_on: [extract_entities, deterministic_precompile]
    description: >
      LLM-backed pass that turns prompt + extracted entities into candidate events,
      candidate labwares, and unresolved refs.
      spec-046: Gating on deterministic completeness is handled internally by the pass
      (not via when: clause) because DEFAULT_WHEN_EVALUATOR only supports simple dot-paths.
      When deterministic completeness >= 0.9 with no residuals, the pass returns early
      without calling the LLM. Otherwise it proceeds with the LLM call, including the
      deterministic plan as context in the user message.

  - id: mint_materials
    family: expand
    depends_on: [ai_precompile]
    when: outputs.ai_precompile.mintMaterials
    description: Expand mintMaterials directives into create_container + add_material events.

  - id: apply_directives
    family: expand
    depends_on: [ai_precompile]
    when: outputs.ai_precompile.directives
    description: Turn ai_precompile.directives entries into DirectiveNode[] with generated directiveIds.

  - id: expand_biology_verbs
    family: expand
    depends_on: [ai_precompile]
    when: outputs.ai_precompile.candidateEvents
    description: Expand high-level biology verbs (seed, incubate, harvest, etc.) in candidate events into compositions of primitive event types that ContextEngine already handles.

  - id: resolve_labware
    family: disambiguate
    depends_on: [ai_precompile]
    when: outputs.ai_precompile.candidateLabwares
    description: Resolve labware hints to existing labware-instance records via searchLabwareByHint; emit AiLabwareAddition entries for unmatched hints.

  - id: resolve_references
    family: disambiguate
    depends_on: [ai_precompile]
    description: Resolve named references (protocol, assay, pattern, compound-class) against their registries.

  - id: resolve_prior_labware_references
    family: disambiguate
    depends_on: [ai_precompile]
    when: outputs.ai_precompile.priorLabwareRefs
    description: Resolve priorLabwareRefs against the priorLabState snapshot.

  - id: expand_protocol
    family: expand
    depends_on: [resolve_references]
    description: Unroll resolved protocol refs into primitive events using step graph + parameter bindings.

  - id: expand_patterns
    family: expand
    depends_on: [ai_precompile]
    when: outputs.ai_precompile.patternEvents
    description: Dispatch patternEvents to registered pattern expanders.

  - id: resolve_roles
    family: expand
    depends_on: [expand_protocol]
    description: Map role coordinates to concrete well addresses under current orientation. Reads events from expand_biology_verbs / expand_patterns / mint_materials / expand_protocol via state.outputs (those passes are conditional, so they cannot be hard dependencies — depending on a `when`-skipped pass would cascade-skip resolve_roles).

  - id: compute_volumes
    family: expand
    depends_on: [resolve_roles]
    description: Resolve 'just_enough', percent-of, and placeholder volumes to concrete uL.

  - id: compute_resources
    family: emit
    depends_on: [compute_volumes]
    description: Emit resource manifest (tip racks, reservoir loads, consumables).

  - id: derive_execution_scale_plan
    family: emit
    depends_on: [compute_resources]
    description: >
      Deterministically derive a conservative execution scaling plan from the
      compiled event graph. Emits ready or blocked guidance for manual tubes,
      bench multichannel plates/reservoirs, and robot deck lowering.

  - id: plan_deck_layout
    family: emit
    depends_on: [compute_resources]
    description: Full deck layout plan with pinned slots, auto-filled remainder, and conflicts.

  - id: validate
    family: validate
    depends_on: [plan_deck_layout]
    description: Aggregate findings from all registered validation checks.

  - id: emit_instrument_run_files
    family: emit
    depends_on: [resolve_roles]
    description: Generate InstrumentRunFile artifacts for each read-event instrument group.

  - id: emit_downstream_queue
    family: emit
    depends_on: [ai_precompile]
    when: outputs.ai_precompile.downstreamCompileJobs
    description: Copy downstreamCompileJobs from ai_precompile into the terminal queue.

  - id: lab_state
    family: emit
    depends_on: [resolve_roles]
    description: Fold directives then expanded events over prior lab-state snapshot and emit labStateDelta.
