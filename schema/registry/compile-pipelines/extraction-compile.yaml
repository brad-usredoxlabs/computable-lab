# Extraction compile pipeline (compiler-specs/60 §3, 80).
# Deterministic wrapper around the AI extractor. Produces an extraction-draft
# record (see schema/workflow/extraction-draft.schema.yaml). Not yet dispatched
# by the compiler — kept as documentation of intended structure.

pipelineId: extraction-compile
entrypoint: extraction-compile
description: >
  Compiles an unstructured source artifact into an extraction-draft record
  containing candidate canonical records. Humans review the draft and
  promote individual candidates via promotion-compile.

passes:
  - id: load_source_artifact
    family: parse
    description: "Load the source artifact (PDF text, prose, user freetext) and associated metadata."

  - id: ai_extract_candidates
    family: parse
    description: >
      Invoke the configured AI model (Qwen3.5 local by default, per 80) to
      emit structured candidate records with confidence and ambiguity spans.
    depends_on: [load_source_artifact]

  - id: mention_resolution
    family: disambiguate
    description: >
      Resolve mentions to canonical entities: materials (ChEBI-backed),
      equipment, labware classes, protocols, claims, contexts.
    depends_on: [ai_extract_candidates]

  - id: candidate_schema_validation
    family: validate
    description: "Validate each candidate against its target record kind's JSON Schema; demote invalid candidates to 'needs revision' on the draft."
    depends_on: [mention_resolution]

  - id: confidence_threshold_filter
    family: normalize
    description: "Apply configured confidence thresholds; demote low-confidence candidates to ambiguity_spans."
    depends_on: [candidate_schema_validation]

  - id: project_extraction_draft
    family: project
    description: "Assemble the extraction-draft record (status: pending_review) with source_artifact, candidates, and ambiguity spans."
    depends_on: [confidence_threshold_filter]
