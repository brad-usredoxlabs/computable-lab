# Extraction compile pipeline (compiler-specs/60 §3, 80).
# Deterministic wrapper around the AI extractor. Produces an extraction-draft
# record (see schema/workflow/extraction-draft.schema.yaml).
#
# Phase-1 semantics per compiler-specs/80-ai-pre-compiler.md:
#   - §3.3: candidates carry lenient structural validation ONLY.
#     Authoritative schema validation happens at promotion time
#     (promotion-compile extraction branch, spec-064).
#   - §7: confidence is not a promotion gate; it is audit metadata.
#
# Previously-declared passes 'candidate_schema_validation',
# 'confidence_threshold_filter', and 'load_source_artifact' have been
# removed. Source loading is caller-provided text; validation is
# deferred to promotion-time; confidence is not filtered here.

pipelineId: extraction-compile
entrypoint: extraction-compile
description: >
  Compile source text into an extraction-draft (XDR-*) record. Phase-1
  semantics per compiler-specs/80-ai-pre-compiler.md:
    - §3.3: candidates carry lenient structural validation ONLY.
      Authoritative schema validation happens at promotion time
      (promotion-compile extraction branch, spec-064).
    - §7: confidence is not a promotion gate; it is audit metadata.
  Previously-declared passes 'candidate_schema_validation',
  'confidence_threshold_filter', and 'load_source_artifact' have been
  removed. Source loading is caller-provided text; validation is
  deferred to promotion-time; confidence is not filtered here.
passes:
  - id: extractor_run
    family: parse
    description: >
      Invoke the configured extractor adapter (spec-055) to emit
      ExtractionResult: candidates with target_kind, draft body, and
      optional ambiguity spans.

  - id: mention_resolve
    family: disambiguate
    description: >
      Resolve mentions in each candidate's draft via the deterministic
      resolver (spec-057 + spec-075). Unresolved mentions become
      ambiguity_spans.
    depends_on: [extractor_run]

  - id: draft_assemble
    family: project
    description: >
      Assemble the extraction-draft record body with status
      'pending_review', folding per-candidate ambiguity_spans onto
      each candidate.
    depends_on: [mention_resolve]
