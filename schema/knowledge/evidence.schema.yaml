$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://computable-lab.com/schema/computable-lab/evidence.schema.yaml"
title: "Evidence"
description: >
  An evidence bundle that links sources (results/contexts/events/publications) to a target assertion (or claim). Evidence bundles carry QC notes and provenance pointers; they are referenced from Assertions/Claims.

type: object
unevaluatedProperties: false
allOf:
- $ref: "./common.schema.yaml#/$defs/FAIRCommon"

required: [ kind, id, supports, sources ]

properties:
  kind:
    const: "evidence"

  id:
    type: string
    description: "Stable identifier (e.g., EVD-0001)."

  supports:
    type: array
    description: "Assertions (or claims) supported by this bundle."
    minItems: 1
    items:
      $ref: "./datatypes/ref.schema.yaml"
    uniqueItems: true

  sources:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/EvidenceSource"

  quality:
    type: object
    description: "Optional QC/curation notes."
    additionalProperties: true

  status:
    type: string
    enum: [active, retracted]
    default: active
    description: "Lifecycle state. Retracted records remain for provenance but are excluded from active queries (compiler-specs/40 §7)."

  retraction:
    type: object
    additionalProperties: false
    description: "Details of retraction. Present only when status == retracted."
    properties:
      reason:
        type: string
        description: "Why this record was retracted."
      retracted_at:
        type: string
        format: date-time
      retracted_by:
        $ref: "./datatypes/ref.schema.yaml"
        description: "Operator who retracted."
      superseded_by:
        $ref: "./datatypes/ref.schema.yaml"
        description: "Replacement record id, if any."

$defs:
  EvidenceSource:
    type: object
    additionalProperties: false
    required: [ type, ref ]
    properties:
      type:
        type: string
        enum: [ result, context, event, publication, file, event_graph ]
      ref:
        $ref: "./datatypes/ref.schema.yaml"
