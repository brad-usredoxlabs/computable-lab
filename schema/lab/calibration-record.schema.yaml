$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://computable-lab.com/schema/computable-lab/calibration-record.schema.yaml"
title: "Calibration Record"
description: >
  Calibration or calibration-like readiness event for a piece of equipment.

type: object
unevaluatedProperties: false
allOf:
- $ref: "./common.schema.yaml#/$defs/FAIRCommon"

required:
- kind
- id
- equipmentRef
- performedAt
- status

properties:
  kind:
    const: "calibration-record"

  id:
    type: string
    pattern: "^CAL-[A-Z0-9][A-Z0-9_-]*$"

  equipmentRef:
    allOf:
    - $ref: "./datatypes/ref.schema.yaml"
    - type: object
      properties:
        kind: { const: record }
        type: { const: equipment }

  performedAt:
    type: string
    format: date-time

  dueAt:
    type: string
    format: date-time

  status:
    type: string
    enum: [ pass, fail, adjusted, limited_use ]

  performedByRef:
    $ref: "./datatypes/ref.schema.yaml"

  notes:
    type: string
