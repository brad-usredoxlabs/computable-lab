$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://computable-lab.com/schema/computable-lab/equipment-capability.schema.yaml"
title: "Equipment Capability"
description: >
  Declares which semantic verbs an equipment item or equipment class can support,
  optionally including backend implementation hints and constraints.

type: object
unevaluatedProperties: false
allOf:
- $ref: "./common.schema.yaml#/$defs/FAIRCommon"

required:
- kind
- id
- status
- capabilities

properties:
  kind:
    const: "equipment-capability"

  id:
    type: string
    pattern: "^ECP-[A-Z0-9][A-Z0-9_-]*$"

  status:
    type: string
    enum: [ active, draft, deprecated ]

  equipmentRef:
    allOf:
    - $ref: "./datatypes/ref.schema.yaml"
    - type: object
      properties:
        kind: { const: record }
        type: { const: equipment }

  equipmentClassRef:
    allOf:
    - $ref: "./datatypes/ref.schema.yaml"
    - type: object
      properties:
        kind: { const: record }
        type: { const: equipment-class }

  capabilities:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [ verbRef ]
      properties:
        verbRef:
          allOf:
          - $ref: "./datatypes/ref.schema.yaml"
          - type: object
            properties:
              kind: { const: record }
              type: { const: verb-definition }
        methodIds:
          type: array
          items: { type: string }
          uniqueItems: true
        backendImplementations:
          type: array
          items: { type: string }
          uniqueItems: true
        constraints:
          type: object
          additionalProperties: true
          properties:
            acceptedLabware:
              type: array
              description: "Labware formats this capability can accept. If omitted, no labware constraint is enforced."
              items:
                type: object
                additionalProperties: false
                required: [ labwareRef ]
                properties:
                  labwareRef:
                    description: "Reference to a labware definition record."
                    allOf:
                    - $ref: "./datatypes/ref.schema.yaml"
                    - type: object
                      properties:
                        kind: { const: record }
                        type: { const: labware }
                  subModule:
                    type: string
                    description: "Optional sub-module name (e.g., rotor model, adapter) that enables this labware acceptance."
                  notes:
                    type: string
        notes:
          type: string

  notes:
    type: string

oneOf:
- required: [ equipmentRef ]
- required: [ equipmentClassRef ]
