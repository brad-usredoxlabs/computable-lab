$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://computable-lab.com/schema/computable-lab/context-promotion.schema.yaml"
title: "Context Promotion"
description: >
  Provenance record describing promotion of execution context(s) into a reusable asset
  such as material lot, plate snapshot, or library bundle.

type: object
unevaluatedProperties: false
allOf:
- $ref: "./common.schema.yaml#/$defs/FAIRCommon"

required: [ kind, recordId, source_context_refs, output_ref, output_kind ]

properties:
  kind:
    const: "context-promotion"

  recordId:
    type: string

  source_context_refs:
    type: array
    minItems: 1
    items:
      $ref: "./datatypes/ref.schema.yaml"

  source_event_graph_ref:
    $ref: "./datatypes/ref.schema.yaml"

  output_kind:
    type: string
    enum:
      - material-spec
      - material-instance
      - aliquot
      - plate-layout-template
      - assay-definition
      - context-snapshot
    description: "Target kind for this promotion (compiler-specs/30-context.md §12.2)."

  output_ref:
    $ref: "./datatypes/ref.schema.yaml"

  method:
    type: string
    description: "Promotion mode or SOP identifier."

  notes:
    type: string

  tags:
    type: array
    items: { type: string }
    uniqueItems: true

  source_content_hash:
    type: string
    description: "Locked content hash of the source context at promotion time (compiler-specs/30 §12.6). Source drift is diagnostic, not retroactively updating."

  version:
    type: integer
    minimum: 1
    default: 1
    description: "Append-only version number within a supersedes chain."

  supersedes:
    $ref: "./datatypes/ref.schema.yaml"
    description: "Prior context-promotion this one replaces. Old promotions remain; assertions grounded in them stay valid."

  selection:
    type: object
    additionalProperties: true
    description: "The ephemeral or stored selection/collection used as promotion input (compiler-specs/30 §12.3). Shape varies by target kind."
