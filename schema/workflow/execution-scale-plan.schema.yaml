$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://computable-lab.com/schema/computable-lab/execution-scale-plan.schema.yaml"
title: "ExecutionScalePlan"
description: >
  A reviewable plan for preserving a protocol's biological intent while
  lowering it from manual tubes to plate/multichannel or robot-deck execution.
  This is planning data, not proof that physical inventory instances exist.

type: object
additionalProperties: false

required:
- kind
- recordId
- sourceLevel
- targetLevel
- status
- reagentLayout
- assumptions
- blockers

properties:
  kind:
    const: "execution-scale-plan"

  recordId:
    type: string
    minLength: 1

  sourceRef:
    description: "Optional source protocol, segment, or event-graph proposal reference."
    type: object
    additionalProperties: true

  profileRef:
    description: "Execution-scale-profile record used to derive the plan."
    type: string

  sourceLevel:
    $ref: "#/$defs/ExecutionScaleLevel"

  targetLevel:
    $ref: "#/$defs/ExecutionScaleLevel"

  status:
    enum: [ready, blocked]

  sampleLayout:
    type: object
    additionalProperties: false
    required: [labwareRole, labwareKind, wellGroups]
    properties:
      labwareRole:
        type: string
      labwareKind:
        enum: [tube_rack, 96_well_plate, 384_well_plate]
      labwareDefinition:
        description: "Optional registry labware-definition selected by the execution-scale profile."
        type: string
      sampleCount:
        type: integer
        minimum: 1
      wellGroups:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [groupId, wells]
          properties:
            groupId:
              type: string
            wells:
              type: array
              items:
                type: string

  reagentLayout:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [materialRole, sourceLabwareRole, sourceLabwareKind, sourceWells, reason]
      properties:
        materialRole:
          type: string
        sourceLabwareRole:
          type: string
        sourceLabwareKind:
          enum: [tube, 2_well_reservoir, 8_well_reservoir, 12_well_reservoir]
        sourceLabwareDefinition:
          description: "Optional registry labware-definition selected by the execution-scale profile."
          type: string
        sourceWells:
          type: array
          items:
            type: string
        reason:
          type: string

  pipettingStrategy:
    type: object
    additionalProperties: false
    required: [pipetteMode, channels, laneStrategy, channelization, batching]
    properties:
      pipetteMode:
        enum: [single_channel, multi_channel_parallel]
      channels:
        enum: [1, 8, 12]
      laneStrategy:
        enum: [sequential_lanes, parallel_lanes]
      channelization:
        enum: [single_channel, multi_channel_prefer, multi_channel_force]
      batching:
        enum: [none, group_by_source, group_by_destination, multi_dispense_prefer]

  deckBinding:
    type: object
    additionalProperties: false
    required: [platform, requiredLabwareDefinitions, requiredTools]
    properties:
      platform:
        enum: [manual, integra_assist, opentrons_ot2, opentrons_flex]
      requiredLabwareDefinitions:
        type: array
        items:
          type: string
      requiredTools:
        type: array
        items:
          type: string

  assumptions:
    type: array
    items:
      type: string

  blockers:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        requiredInput:
          type: string

$defs:
  ExecutionScaleLevel:
    enum: [manual_tubes, bench_plate_multichannel, robot_deck]
