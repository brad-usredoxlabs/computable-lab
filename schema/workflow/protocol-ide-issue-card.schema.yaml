$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://computable-lab.com/schema/computable-lab/workflow/protocol-ide-issue-card.schema.yaml"
title: "ProtocolIdeIssueCard"
description: >
  Issue card for the Protocol IDE.  Captures a single concern (user-reported
  or system-generated) with evidence citations, an optional graph anchor, and
  export metadata.  Issue cards are mutable workspace items — they do NOT
  carry workflow-state enums such as open / resolved / closed.

type: object
additionalProperties: false

required:
- kind
- recordId
- sessionRef
- origin
- title
- body

properties:
  kind:
    const: "protocol-ide-issue-card"

  recordId:
    type: string
    pattern: '^PIC-[A-Za-z0-9_-]+$'
    description: "Protocol IDE issue card record id (PIC-*)."

  sessionRef:
    $ref: "https://computable-lab.com/schema/computable-lab/datatypes/ref.schema.yaml"
    description: >
      Reference to the protocol-ide-session this card belongs to.

  origin:
    type: string
    enum: [ user, system, mixed ]
    description: >
      Who originated this issue card.
      - user: created from user feedback or annotation.
      - system: generated by automated diagnostics or validation.
      - mixed: combines user input and system-generated content.

  title:
    type: string
    description: >
      Short, human-readable title of the issue.

  body:
    type: string
    description: >
      Detailed description of the issue.  May include free-text, structured
      diagnostics, or references to other records.

  # ── Evidence citations ──────────────────────────────────────────────
  evidenceCitations:
    type: array
    description: >
      Citations back to source snippets, PDF pages, or diagnostic outputs.
    items:
      type: object
      additionalProperties: false
      required: [ sourceRef, snippet ]
      properties:
        sourceRef:
          $ref: "https://computable-lab.com/schema/computable-lab/datatypes/ref.schema.yaml"
          description: >
            Reference to the source record (e.g., extraction-draft,
            ingestion-artifact) that contains the evidence.
        snippet:
          type: string
          maxLength: 500
          description: >
            Literal text slice from the source that evidences this issue.
        page:
          type: integer
          minimum: 1
          description: >
            Page number in the source PDF where the evidence appears.
        locator:
          type: string
          description: >
            Optional sub-locator (e.g., "section 3.2", "well A1").

  # ── Graph anchor ────────────────────────────────────────────────────
  graphAnchor:
    type: string
    description: >
      Optional identifier pointing to a specific node or edge in the
      event-graph payload (e.g., "event:0042" or "step:wash-01").

  # ── Export metadata ─────────────────────────────────────────────────
  exportedAt:
    type: string
    format: date-time
    description: >
      ISO 8601 timestamp when this card was exported to Ralph.

  exportBundleRef:
    $ref: "https://computable-lab.com/schema/computable-lab/datatypes/ref.schema.yaml"
    description: >
      Reference to the export bundle that contains this card.

  notes:
    type: string
    description: >
      Free-form notes about the issue card.
