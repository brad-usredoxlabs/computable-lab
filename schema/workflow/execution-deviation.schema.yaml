$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://computable-lab.com/schema/computable-lab/execution-deviation.schema.yaml"
title: "ExecutionDeviation"
description: >
  Append-only accepted or observed diff between compiled execution intent and
  executed reality. Does not mutate the source compiled plan.

type: object
additionalProperties: false

required:
- kind
- recordId
- executionRunRef
- plannedRunRef
- robotPlanRef
- deviationType
- status
- compiledIntent
- diff
- actor
- authority
- rationale
- recordedAt
- activePolicy
- severity

properties:
  kind:
    const: "execution-deviation"

  recordId:
    type: string

  executionRunRef:
    $ref: "./datatypes/ref.schema.yaml"

  plannedRunRef:
    $ref: "./datatypes/ref.schema.yaml"

  robotPlanRef:
    $ref: "./datatypes/ref.schema.yaml"

  deviationType:
    type: string
    enum: [ remediation, operator, runtime, environmental ]

  severity:
    type: string
    enum: [ minor, significant, major ]
    description: >
      Biologist-relevance axis — does this change what the data means?
      minor: within declared tolerance.
      significant: outside tolerance but run remains analyzable.
      major: invalidates the run or flags downstream assertions as unreliable.
      Distinct from execution-incident.severity (ops urgency).

  status:
    type: string
    enum: [ accepted, observed ]

  compiledIntent:
    $ref: "#/$defs/intent_snapshot"

  diff:
    $ref: "#/$defs/execution_diff"

  actor:
    $ref: "#/$defs/evidence_actor"

  authority:
    $ref: "#/$defs/approval_authority"

  rationale:
    type: string

  recordedAt:
    type: string
    format: date-time

  remediationDecisionRef:
    $ref: "./datatypes/ref.schema.yaml"

  activePolicy:
    $ref: "#/$defs/active_policy"

$defs:
  approval_authority:
    type: string
    enum: [ none, run-operator, supervisor, project-owner, lab-manager, qa-reviewer, organization-admin, system ]

  evidence_actor:
    type: object
    additionalProperties: false
    required: [ actorId, role ]
    properties:
      actorId:
        type: string
      role:
        type: string
        enum: [ run-operator, supervisor, qa-reviewer, system ]
      displayName:
        type: string

  execution_diff:
    type: object
    additionalProperties: false
    required: [ target, path, op ]
    properties:
      stepId:
        type: string
      target:
        type: string
        enum: [ protocol-step, robot-step, run ]
      path:
        type: string
      op:
        type: string
        enum: [ add, replace, remove, annotate ]
      previousValue: {}
      value: {}
      note:
        type: string

  intent_snapshot:
    type: object
    additionalProperties: false
    required: [ source, snapshot ]
    properties:
      stepId:
        type: string
      source:
        type: string
        enum: [ protocol-compilation, robot-plan, run ]
      snapshot:
        type: object
        additionalProperties: true

  active_policy:
    type: object
    additionalProperties: false
    required: [ scope, profileIds, approvalAuthority, originProfileId, settings ]
    properties:
      scope:
        type: object
        additionalProperties: true
      profileIds:
        type: array
        items: { type: string }
      approvalAuthority:
        $ref: "#/$defs/approval_authority"
      originProfileId:
        type: string
      settings:
        type: object
        additionalProperties: true
