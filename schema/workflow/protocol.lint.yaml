# Lint rules for Protocol records
lintVersion: 1
schemaId: "https://computable-lab.com/schema/computable-lab/protocol.schema.yaml"

# Intended rules (pending DSL support for cross-array relational checks):
#
#   artifact-step-binding
#     For every producedArtifacts[i].artifactId, at least one step must
#     reference it (currently only StepHarvest.producesArtifactId, but the
#     rule should admit any future step kind that can emit artifacts).
#     Severity: error.
#
#   artifact-role-closure
#     Every producedArtifacts[i].derivedFromRoles[j] must appear in
#     roles.materialRoles[*].roleId or roles.labwareRoles[*].roleId.
#     Severity: error.
#
#   harvest-artifact-declared
#     Any StepHarvest.producesArtifactId must match a declared
#     producedArtifacts[*].artifactId. Severity: error.
#
#   material-artifact-has-derivation-type
#     When producedArtifacts[i].kind == 'material', derivationType SHOULD be
#     set so runs know which material-derivation flavor to emit.
#     Severity: warning.
#
#   phase-id-unique
#     Within a single protocol, all phases[].id values must be unique.
#     Severity: error.
#
#   phase-ordinals-contiguous
#     When phases has N items, the set of phases[*].ordinal values must
#     equal {1, 2, ..., N} exactly. No gaps, no duplicates.
#     Severity: error.
#
#   step-phase-id-resolves
#     If steps[].phaseId is present, it must equal one of the protocol's
#     declared phases[*].id values. Severity: error.
#
#   phase-template-ref-format
#     If phases[].templateRef is present, it must match the pattern
#     ^PHASE-[A-Z0-9-]+$. (Cross-record existence of the referenced
#     phase-template is a separate concern.) Severity: error.
#
# These rules require quantification over arrays and path-to-path comparison,
# which the current predicate DSL (exists/nonEmpty/regex/equals/in/all/any/not)
# does not yet support. Track DSL extension separately; do not hard-code these
# checks in TypeScript.

rules: []
