# Lint rules for PhaseTemplate records
lintVersion: 1
schemaId: "https://computable-lab.com/schema/computable-lab/phase-template.schema.yaml"

rules:
- id: phase-id-format
  description: "id must exist and match the PHASE-* pattern."
  assert:
    op: all
    rules:
    - predicate: exists
      args: ["id"]
    - predicate: regex
      args: ["id", "^PHASE-[A-Z0-9-]+$"]

- id: phase-canonical-format
  description: "canonical must exist and match the lowercase-kebab pattern."
  assert:
    op: all
    rules:
    - predicate: exists
      args: ["canonical"]
    - predicate: regex
      args: ["canonical", "^[a-z][a-z0-9-]*$"]

- id: phase-domain-value
  description: "domain must exist and be one of the four allowed values."
  assert:
    op: all
    rules:
    - predicate: exists
      args: ["domain"]
    - predicate: in
      args: ["domain", ["cell-biology", "biochemistry", "molecular-biology", "general"]]
