# UI specification for Budget records — document-style editor surface
uiVersion: 1
schemaId: "https://computable-lab.com/schema/computable-lab/budget.schema.yaml"

display:
  titleField: "$.title"
  subtitleField: "$.state"
  icon: "budget"

# Document-style editor contract (primary surface)
editor:
  mode: "document"
  blocks:
    - id: "header-summary"
      kind: "section"
      label: "Budget Summary"
      help: "Overview of budget state, currency, and totals."
    - id: "line-items"
      kind: "repeater"
      label: "Line Items"
      help: "Selected vendor-offer lines with pricing. Edit quantities and approve."
      path: "$.lines"
    - id: "totals"
      kind: "section"
      label: "Totals"
      help: "Computed summary of approved line items."
  slots:
    - id: "title-slot"
      path: "$.title"
      label: "Budget Title"
      widget: "text"
      required: true
    - id: "state-slot"
      path: "$.state"
      label: "State"
      widget: "select"
      suggestionProviders:
        - local-vocab
    - id: "currency-slot"
      path: "$.currency"
      label: "Currency"
      widget: "select"
      suggestionProviders:
        - local-vocab
    - id: "notes-slot"
      path: "$.notes"
      label: "Notes"
      widget: "textarea"
      suggestionProviders:
        - local-vocab

# Fallback form for compatibility
form:
  layout: "sections"
  sections:
  - title: "Identity"
    fields:
    - path: "$.recordId"
      widget: "text"
      label: "Record ID"
      readonly: true
    - path: "$.kind"
      widget: "text"
      label: "Kind"
      readonly: true
      hidden: true
  - title: "Budget Details"
    fields:
    - path: "$.title"
      widget: "text"
      label: "Title"
      required: true
    - path: "$.state"
      widget: "select"
      label: "State"
      required: true
    - path: "$.currency"
      widget: "select"
      label: "Currency"
    - path: "$.lines"
      widget: "array"
      label: "Line Items"
  - title: "Notes"
    fields:
    - path: "$.notes"
      widget: "textarea"
      label: "Notes"
    - path: "$.tags"
      widget: "array"
      label: "Tags"

list:
  columns:
  - path: "$.recordId"
    label: "ID"
    width: "120px"
  - path: "$.title"
    label: "Title"
  - path: "$.state"
    label: "State"
    width: "100px"
  - path: "$.currency"
    label: "Currency"
    width: "80px"
