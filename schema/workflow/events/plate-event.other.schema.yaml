$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://computable-lab.com/schema/computable-lab/datatypes/plate-event.other.schema.yaml"
title: "PlateEventOtherDetails"
type: object
additionalProperties: false
required: [ description ]

properties:
  labwareInstanceId:
    $ref: "./ref.schema.yaml"
    description: "Optional labware instance if applicable."

  wells:
    type: array
    items: { type: string }
    description: "Optional affected wells."

  description:
    type: string
    minLength: 1

  notes:
    type: string

  family:
    type: string
    enum: [material-movement, state-transformation, lifecycle, measurement, composition]
    description: "Event family per compiler-specs/20-event-graph-ir.md §3."
    default: state-transformation

  preconditions:
    type: array
    description: "Reserved: predicate-DSL objects checked at plan-compile time (compiler-specs/20-event-graph-ir.md §6). Not validated in v1."
    items:
      type: object
      additionalProperties: true
