$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://computable-lab.com/schema/computable-lab/datatypes/plate-event-macro-program.schema.yaml"
title: "PlateEvent Macro Program Details"
type: object
description: >
  Authoring-time macro/vignette payload. Preserves higher-level reusable program
  configuration on event graphs before platform-specific compilation.

additionalProperties: true

required:
- program

properties:
  program:
    type: object
    additionalProperties: true

  family:
    type: string
    enum: [material-movement, state-transformation, lifecycle, measurement, composition]
    description: "Event family per compiler-specs/20-event-graph-ir.md §3."
    default: composition

  preconditions:
    type: array
    description: "Reserved: predicate-DSL objects checked at plan-compile time (compiler-specs/20-event-graph-ir.md §6). Not validated in v1."
    items:
      type: object
      additionalProperties: true
