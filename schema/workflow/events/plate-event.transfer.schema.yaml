$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://computable-lab.com/schema/computable-lab/datatypes/plate-event.transfer.schema.yaml"
title: "PlateEventTransferDetails"
type: object
additionalProperties: false
required: [ source, target, volume_uL ]

properties:
  source:
    type: object
    additionalProperties: false
    required: [ labwareInstanceId ]
    properties:
      labwareInstanceId:
        $ref: "./ref.schema.yaml"
      wells:
        type: array
        minItems: 1
        items: { type: string }
        description: "Optional if mapping is provided."

  target:
    type: object
    additionalProperties: false
    required: [ labwareInstanceId ]
    properties:
      labwareInstanceId:
        $ref: "./ref.schema.yaml"
      wells:
        type: array
        minItems: 1
        items: { type: string }
        description: "Optional if mapping is provided."

  volume_uL:
    type: number
    exclusiveMinimum: 0
    description: "Nominal transfer volume per dispense."

  mapping:
    type: array
    description: >
      Optional explicit source->target mapping. If present, it is canonical for replay. If omitted, source.wells and target.wells are paired positionally.
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [ source_well, target_well ]
      properties:
        source_well: { type: string }
        target_well: { type: string }
        volume_uL:
          type: number
          exclusiveMinimum: 0
          description: "Optional per-pair override."

  inputs:
    type: array
    description: "Cross-graph lineage: upstream contexts consumed by this transfer."
    items:
      type: object
      additionalProperties: false
      required: [ contextRef ]
      properties:
        contextRef:
          $ref: "./ref.schema.yaml"
          description: "Reference to upstream Context (from another event graph)."
        amount:
          type: object
          additionalProperties: false
          properties:
            value: { type: number }
            unit: { type: string }
          required: [ value, unit ]

  notes:
    type: string

  family:
    type: string
    enum: [material-movement, state-transformation, lifecycle, measurement, composition]
    description: "Event family per compiler-specs/20-event-graph-ir.md §3."
    default: material-movement

  preconditions:
    type: array
    description: "Reserved: predicate-DSL objects checked at plan-compile time (compiler-specs/20-event-graph-ir.md §6). Not validated in v1."
    items:
      type: object
      additionalProperties: true

  carryover_policy:
    type: string
    enum: [ignored, residual_fraction, per_tip_model]
    default: ignored
    description: "Reserved for v2 (compiler-specs/20-event-graph-ir.md §5.3). v1 treats all transfers as ignored."

allOf:
- anyOf:
  - required: [ mapping ]
  - properties:
      source: { required: [ wells ] }
      target: { required: [ wells ] }
