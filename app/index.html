<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <!-- PWA shell: vite-plugin-pwa injects the <link rel="manifest"> at
         build time, but iOS Safari needs the apple-touch-icon + the
         apple-mobile-web-app-* metas declared up-front to get a proper
         "Add to Home Screen" experience. Theme-color drives the iOS
         status-bar tint when the page is launched standalone. -->
    <meta name="theme-color" content="#0e1116" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Event Editor" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <title>Semantic ELN</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
