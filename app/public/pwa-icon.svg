<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App-shell icon for the Event Editor PWA. Geometric, theme-agnostic
       so it reads well as both a launcher icon and an apple-touch-icon
       on iOS Home Screen. Replace with a brand mark when one exists. -->
  <rect width="512" height="512" rx="96" fill="#0e1116"/>
  <!-- Three "deck slots" + a fix-it dot -->
  <rect x="80" y="120" width="160" height="100" rx="14" fill="#1c232c" stroke="#3a4150" stroke-width="3"/>
  <rect x="272" y="120" width="160" height="100" rx="14" fill="#1c232c" stroke="#3a4150" stroke-width="3"/>
  <rect x="80" y="252" width="160" height="100" rx="14" fill="#1c232c" stroke="#3a4150" stroke-width="3"/>
  <rect x="272" y="252" width="160" height="100" rx="14" fill="#58a6ff" stroke="#58a6ff" stroke-width="3"/>
  <!-- Pipette / wand glyph -->
  <circle cx="352" cy="302" r="22" fill="#0e1116"/>
  <rect x="346" y="282" width="12" height="60" rx="6" fill="#0e1116"/>
</svg>
